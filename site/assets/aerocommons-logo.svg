<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AeroCommons GitHub Avatar</title>
  <desc id="desc">Deep navy circular field with orange origin dot and three sweeping contrail lines.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="70%" cy="18%" r="90%">
      <stop offset="0%" stop-color="#1F3151"/>
      <stop offset="65%" stop-color="#152238"/>
      <stop offset="100%" stop-color="#0E1727"/>
    </radialGradient>

    <linearGradient id="trailGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2956A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8702A" stop-opacity="1"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="252" fill="#F3F0E9" opacity="0.12"/>
  <circle cx="256" cy="256" r="236" fill="url(#bgGlow)"/>

  <path d="M56 210 Q192 150 424 222" fill="none" stroke="url(#trailGlow)" stroke-width="26" stroke-linecap="round"/>
  <path d="M58 262 Q198 214 426 286" fill="none" stroke="#F3F0E9" stroke-width="14" stroke-linecap="round" opacity="0.62"/>
  <path d="M64 308 Q202 270 426 336" fill="none" stroke="#F3F0E9" stroke-width="7" stroke-linecap="round" opacity="0.32"/>

  <circle cx="50" cy="210" r="18" fill="#E8702A"/>
  <circle cx="50" cy="210" r="28" fill="#E8702A" opacity="0.22" filter="url(#softGlow)"/>

  <path d="M70 126 Q236 60 430 122" fill="none" stroke="#F3F0E9" stroke-width="2" opacity="0.12"/>
  <path d="M76 386 Q238 334 430 392" fill="none" stroke="#F3F0E9" stroke-width="2" opacity="0.1"/>
</svg>
