<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AeroCommons - Panel Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=Inter:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  /* DejaVu is the pyEfis default family but isn't on Google Fonts; load it from
     a CDN so instrument twins render in the same font as the device. */
  @font-face { font-family: "DejaVu Sans Condensed"; font-weight: 400; font-display: swap;
    src: url("https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSansCondensed.ttf") format("truetype"); }
  @font-face { font-family: "DejaVu Sans Condensed"; font-weight: 700; font-display: swap;
    src: url("https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSansCondensed-Bold.ttf") format("truetype"); }
  @font-face { font-family: "DejaVu Sans"; font-weight: 400; font-display: swap;
    src: url("https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans.ttf") format("truetype"); }
  @font-face { font-family: "DejaVu Sans Mono"; font-weight: 400; font-display: swap;
    src: url("https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSansMono.ttf") format("truetype"); }
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid #21262d; flex-wrap: wrap;
  }
  header .brand { font-weight: 600; color: #e6edf3; }
  header .spacer { flex: 1; }
  header .muted { color: #8b949e; font-size: 13px; }
  button, .btn {
    font: inherit; border: 1px solid #30363d; background: #21262d; color: #e6edf3;
    border-radius: 7px; padding: 7px 12px; cursor: pointer; text-decoration: none;
  }
  button:hover { border-color: #8b949e; }
  .btn.primary { background: #238636; border-color: #2ea043; }
  .layout { flex: 1; display: flex; min-height: 0; }
  .palette, .props {
    width: 240px; overflow-y: auto; padding: 12px; border-right: 1px solid #21262d;
  }
  .props { border-right: none; border-left: 1px solid #21262d; width: 280px; }
  .stage { flex: 1; min-height: 0; overflow: auto; padding: 18px; display: flex; justify-content: center; }
  .center { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .screens-bar { display: flex; align-items: center; gap: 4px; padding: 6px 10px 0; flex-wrap: wrap; }
  .screen-tab { font: inherit; background: #161b22; border: 1px solid #21262d; border-bottom: none;
    color: #8b949e; padding: 5px 12px; border-radius: 6px 6px 0 0; cursor: pointer; white-space: nowrap; }
  .screen-tab.active { color: #e6edf3; background: #0d1117; border-color: #30363d; }
  .screen-add { font: inherit; background: none; border: 1px dashed #30363d; color: #8b949e;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; }
  .screen-actions { margin-left: auto; display: flex; gap: 6px; }
  .screen-act { font: inherit; font-size: 12px; background: none; border: 1px solid #30363d; color: #8b949e;
    padding: 4px 9px; border-radius: 6px; cursor: pointer; }
  .screen-act:hover { color: #e6edf3; border-color: #8b949e; }
  .tabs { display: flex; gap: 4px; padding: 8px 12px 0; }
  .tab { font: inherit; background: none; border: 1px solid transparent; border-bottom: none; padding: 6px 14px; color: #8b949e; border-radius: 6px 6px 0 0; cursor: pointer; }
  .tab.active { color: #e6edf3; background: #161b22; border-color: #21262d; }
  #code-pane { flex: 0 0 32%; min-height: 120px; display: flex; flex-direction: column; padding: 10px 12px; border-top: 1px solid #21262d; }
  #code-pane.hidden { display: none; }
  .hidden { display: none; }
  .code-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  #code-text { flex: 1; width: 100%; resize: none; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 7px; padding: 10px; line-height: 1.4; }
  h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #8b949e; margin: 14px 0 6px; }
  h3:first-child { margin-top: 0; }
  .pal-item {
    display: flex; align-items: center; gap: 8px; padding: 6px; border: 1px solid #21262d;
    border-radius: 6px; margin-bottom: 6px; cursor: grab; background: #161b22;
  }
  .pal-item:hover { border-color: #8b949e; }
  .pal-item img { width: 44px; height: 30px; object-fit: contain; background: #000; border-radius: 3px; }
  .pal-item .lbl { font-size: 12px; color: #e6edf3; }
  .pal-group { position: relative; width: 44px; height: 30px; background: #000; border-radius: 3px; flex: 0 0 auto; }
  .pal-group img { position: absolute; object-fit: fill; }
  .inst.group { outline-color: rgba(150,180,205,.6); }
  .gchild { position: absolute; object-fit: fill; pointer-events: none; }
  #canvas { position: relative; background: #000; border: 1px solid #30363d; }
  #canvas.dragover { outline: 2px dashed #2ea043; outline-offset: -2px; }
  #canvas.grid {
    background-image:
      repeating-linear-gradient(to right, rgba(255,255,255,.045) 0 1px, transparent 1px var(--cw)),
      repeating-linear-gradient(to bottom, rgba(255,255,255,.045) 0 1px, transparent 1px var(--ch)),
      repeating-linear-gradient(to right, rgba(255,255,255,.10) 0 1px, transparent 1px var(--cw10)),
      repeating-linear-gradient(to bottom, rgba(255,255,255,.10) 0 1px, transparent 1px var(--ch10));
  }
  #guides, #align { position: absolute; inset: 0; pointer-events: none; }
  .guide-v { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(96,165,196,.35); }
  .guide-h { position: absolute; left: 0; right: 0; height: 1px; background: rgba(96,165,196,.35); }
  .guide-box { position: absolute; border: 1px dashed rgba(96,165,196,.45); border-radius: 2px; }
  .guide-label { position: absolute; top: 2px; left: 5px; font-size: 10px; color: rgba(150,180,205,.8); }
  .align-v { position: absolute; top: 0; bottom: 0; width: 1px; background: #e24bd0; }
  .align-h { position: absolute; left: 0; right: 0; height: 1px; background: #e24bd0; }
  .inst { position: absolute; outline: 1px solid rgba(120,140,160,.4); }
  .inst img { width: 100%; height: 100%; display: block; pointer-events: none; object-fit: fill; }
  .inst.lock img { object-fit: contain; }
  .inst-text {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    overflow: hidden; line-height: 1; white-space: nowrap; pointer-events: none; color: #fff;
  }
  .gauge { width: 100%; height: 100%; box-sizing: border-box; pointer-events: none; overflow: hidden; }
  .gauge-svg { width: 100%; height: 100%; display: block; }
  .svsimg { width: 100%; height: 100%; overflow: hidden; background: #15639f; }
  .svsimg img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .bargauge { display: flex; flex-direction: column; padding: 2px 3px; gap: 1px; }
  .bargauge .g-name, .bargauge .g-val { line-height: 1; white-space: nowrap; }
  /* Vertical: name/value centred over the bar (pyEfis VerticalBar AlignCenter). */
  .bargauge.vert { align-items: center; justify-content: flex-start; }
  /* Horizontal: name top-left, value bottom-left, bar full width (HorizontalBar AlignLeft). */
  .bargauge.horiz { align-items: stretch; justify-content: space-between; }
  .bargauge.horiz .g-name, .bargauge.horiz .g-val { text-align: left; }
  .bargauge .g-track { position: relative; border: 1px solid #30363d; border-radius: 2px; }
  .bargauge.vert .g-track { flex: 1; width: 32%; background: linear-gradient(to top, #e0231f 0 6%, #e8c21a 6% 18%, #22b03a 18% 82%, #e8c21a 82% 94%, #e0231f 94% 100%); }
  .bargauge.vert .g-mark { position: absolute; left: -18%; right: -18%; height: 2px; background: #fff; transform: translateY(50%); }
  .bargauge.horiz .g-track { width: 100%; height: 30%; background: linear-gradient(to right, #e0231f 0 6%, #e8c21a 6% 18%, #22b03a 18% 82%, #e8c21a 82% 94%, #e0231f 94% 100%); }
  .bargauge.horiz .g-mark { position: absolute; top: -18%; bottom: -18%; width: 2px; background: #fff; transform: translateX(-50%); }
  .tape { position: relative; box-sizing: border-box; background: rgba(18,22,28,.72); color: #e6edf3; }
  .tape .tk { position: absolute; right: 3px; transform: translateY(-50%); white-space: nowrap; line-height: 1; opacity: .85; }
  .tape .readout { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); background: #000; border: 1px solid #9aa4af; text-align: center; font-weight: 600; line-height: 1.2; }
  .tape .vbands { position: absolute; left: 0; top: 0; bottom: 0; width: 9%; background: linear-gradient(to top, #22b03a 0 45%, #e8c21a 45% 72%, #e0231f 72% 88%, #fff 88% 100%); }
  .tape .readout.notch { left: 14%; right: 6%; background: #000; border: 1px solid #fff; }
  .tape .readout.notch::before { content: ""; position: absolute; left: -6px; top: 50%; transform: translateY(-50%); border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-right: 6px solid #000; }
  .htape { position: relative; box-sizing: border-box; overflow: hidden; background: rgba(18,22,28,.72); color: #e6edf3; }
  .htape .htk { position: absolute; top: 6%; transform: translateX(-50%); text-align: center; line-height: 1; white-space: nowrap; }
  .htape .htk .bar { display: block; width: 1px; height: 6px; margin: 0 auto 1px; background: currentColor; opacity: .55; }
  .htape .htk.maj .bar { height: 9px; opacity: .9; }
  .htape .htk .lbl.card { color: #34d3ff; }
  .htape .hlubber { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); background: #fff; opacity: .8; }
  .trendtape { position: relative; box-sizing: border-box; overflow: hidden; background: rgba(18,22,28,.72); color: #e6edf3; }
  .trendtape .tt-hdr { position: absolute; left: 2px; top: 1px; font-size: .85em; line-height: 1.1; z-index: 1; }
  .trendtape .tt-row { position: absolute; left: 0; right: 0; transform: translateY(-50%); display: flex; align-items: center; gap: 3px; }
  .trendtape .tt-num { width: 2.4em; text-align: right; opacity: .85; }
  .trendtape .tt-tick { flex: 1; height: 1px; background: currentColor; opacity: .5; }
  .trendtape .tt-trend { position: absolute; right: 4px; width: 13%; background: #fff; }
  .vsipfd { position: relative; box-sizing: border-box; overflow: hidden; background: rgba(18,22,28,.72); color: #e6edf3; }
  .vsipfd .vp-row { position: absolute; left: 0; right: 0; transform: translateY(-50%); display: flex; align-items: center; gap: 2px; }
  .vsipfd .vp-line { flex: 1; height: 2px; background: #fff; }
  .vsipfd .vp-num { width: 3em; text-align: right; }
  .vsipfd .vp-ind { position: absolute; left: 4%; transform: translateY(-50%); width: 34%; height: 16%; border-radius: 50%; background: #f0f; }
  .wind { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 0 6%; line-height: 1.25; white-space: pre; }
  .trendstrip { position: relative; box-sizing: border-box; overflow: hidden; background: rgba(18,22,28,.5); }
  .trendstrip .ts-ref { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: #fff; opacity: .6; }
  .trendstrip .ts-bar { position: absolute; left: 50%; right: 0; background: #fff; }
  .asbox { display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; padding: 1px 3px; line-height: 1; white-space: nowrap; }
  .asbox .ab-mode { text-align: left; }
  .asbox .ab-val { text-align: right; }
  .inst.sel { outline: 2px solid #2ea043; z-index: 50; }
  .inst .handle {
    position: absolute; right: -5px; bottom: -5px; width: 12px; height: 12px;
    background: #2ea043; border: 1px solid #0d1117; border-radius: 2px; cursor: se-resize;
  }
  .inst.placeholder { outline-color: rgba(210,170,90,.6); }
  .field { margin-bottom: 9px; }
  .field label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 2px; }
  .field label .info { display: inline-flex; align-items: center; vertical-align: -2px; margin-left: 5px; color: #6b7785; cursor: help; }
  .field label .info:hover { color: #58a6ff; }
  .field label .info svg { width: 12px; height: 12px; }
  .field input, .field select {
    width: 100%; font: inherit; font-size: 13px; background: #0d1117; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 5px; padding: 5px 7px;
  }
  .field input[type=checkbox] { width: auto; }
  .field input[type=color] { height: 30px; padding: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .muted { color: #8b949e; font-size: 13px; }
  .empty { color: #6e7681; font-size: 13px; padding: 20px 4px; }
  #status { font-size: 12px; color: #8b949e; }
  .layer-tools { gap: 4px; margin-bottom: 8px; }
  .layer-tools button { padding: 3px 7px; font-size: 12px; }
  ul.layers { list-style: none; padding: 0; margin: 0 0 6px; }
  ul.layers .layer {
    padding: 5px 8px; border: 1px solid #21262d; border-radius: 5px; margin-bottom: 4px;
    font-size: 12px; cursor: pointer; color: #8b949e;
  }
  ul.layers .layer:hover { border-color: #8b949e; }
  ul.layers .layer.sel { border-color: #2ea043; color: #e6edf3; }
  hr.sep { border: none; border-top: 1px solid #21262d; margin: 14px 0; }
  .tsel { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 5px; }
  .tsel select, .num {
    font: inherit; font-size: 12px; background: #0d1117; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 5px; padding: 4px 6px;
  }
  .num { width: 62px; }
</style>
</head>
<body>
<header>
  <span class="brand">AeroCommons</span><span class="muted">Panel Editor</span>
  <span class="muted" id="ctx"></span>
  <label class="tsel">Screen <select id="res"></select></label>
  <span id="custom" class="hidden"><input id="cw" type="number" class="num"> × <input id="ch" type="number" class="num"></span>
  <label class="tsel">Size <select id="inches"></select></label>
  <span class="muted" id="readout"></span>
  <label class="tsel"><input type="checkbox" id="gridToggle" checked> Grid</label>
  <label class="tsel"><input type="checkbox" id="snapToggle"> Snap</label>
  <label class="tsel">Guides
    <select id="guides-sel">
      <option value="none">none</option>
      <option value="center">center</option>
      <option value="thirds">thirds</option>
      <option value="golden">golden φ</option>
      <option value="basic-t">basic-T</option>
      <option value="pfd-ems">PFD + EMS (⅔)</option>
    </select>
  </label>
  <label class="tsel"><input type="checkbox" id="codeToggle" checked> Code</label>
  <span class="spacer"></span>
  <span id="status"></span>
  <button id="del">Delete</button>
  <button id="save" class="btn primary">Save</button>
  <a class="btn" href="/">Done</a>
</header>

<div class="layout">
  <aside class="palette" id="palette"></aside>
  <div class="center">
    <div class="screens-bar" id="screens-bar"></div>
    <div class="stage" id="stage"><div id="canvas"><div id="guides"></div><div id="align"></div></div></div>
    <div id="code-pane">
      <div class="code-bar"><span class="muted">YAML — edits apply live</span><span id="code-msg" class="muted"></span></div>
      <textarea id="code-text" spellcheck="false"></textarea>
    </div>
  </div>
  <aside class="props" id="props"><p class="empty">Select an instrument to edit its properties, or drag one from the left onto the canvas.</p></aside>
</div>

<script>
const $ = (id) => document.getElementById(id);
const ASSETS = "/assets/editor";
const params = new URLSearchParams(location.search);
const deviceId = params.get("device");

const state = {
  schema: null,
  screen: { width: 1280, height: 800, inches: 10.1 },  // device physical display (shared by all screens)
  // A device can hold several screens (PFD / EMS / RADIO ...) the pilot switches
  // between. Each: { name, layout, instruments }. `layout` + `instruments` below
  // are ALIASES to screens[active] so the canvas code edits the active screen.
  screens: [{ name: "PANEL", layout: { rows: 110, columns: 200 }, instruments: [] }],
  active: 0,
  defaultScreen: "PANEL",        // which screen boots on the device
  layout: null,                  // -> screens[active].layout  (pyEfis normalised 110x200 grid)
  instruments: null,             // -> screens[active].instruments
  selected: -1,
  canvasW: 0, canvasH: 0,
  snap: false,
  guides: "none",
  groups: [], groupsById: {},
};
state.layout = state.screens[0].layout;
state.instruments = state.screens[0].instruments;

// Point the active-screen aliases at screens[i]. The aliases share the SAME
// array/object references, so all the existing canvas code (push/splice/index on
// state.instruments) keeps screens[active] in sync automatically.
function setActive(i) {
  state.active = i;
  state.layout = state.screens[i].layout;
  state.instruments = state.screens[i].instruments;
  state.selected = -1;
}

const SNAP = 10;  // grid cells; "Snap" rounds to this (aligned with the grid majors)
function snapTo(v) { return state.snap ? Math.round(v / SNAP) * SNAP : Math.round(v); }

// Text-bearing instruments are drawn live in the browser (HTML text in the
// chosen web font + colour), so font/colour/text changes preview accurately.
// Everything else uses the pre-rendered SVG.
const LIVE_TEXT = new Set(["static_text", "value_text", "numeric_display", "heading_display"]);
// Mirror of ValueDisplay._format_value: a digit mask. "" = as-is; "000" =
// rounded + zero-padded to 3 integer digits (089); "000.0" = + decimals.
function formatValue(value, fmt) {
  if (!fmt) return String(value);
  const v = Number(value);
  if (!isFinite(v)) return String(value);
  const dot = fmt.indexOf(".");
  if (dot >= 0) {
    const decimals = fmt.length - dot - 1, intdigits = dot;
    let s = v.toFixed(decimals), neg = s.startsWith("-"); if (neg) s = s.slice(1);
    let [ip, dp] = s.split(".");
    return (neg ? "-" : "") + ip.padStart(intdigits, "0") + (dp !== undefined ? "." + dp : "");
  }
  let s = Math.round(v).toString(), neg = s.startsWith("-"); if (neg) s = s.slice(1);
  return (neg ? "-" : "") + s.padStart(fmt.length, "0");
}

function sampleText(inst) {
  const o = inst.options || {};
  switch (inst.type) {
    case "static_text": return o.text || "Text";
    case "heading_display": return "360°";  // HeadingDisplay shows "NNN°"
    case "numeric_display": return "123";
    // With a number format set, preview a formatted sample so the mask is
    // visible; otherwise fall back to the bound key name.
    case "value_text": return o.number_format ? formatValue(88.8, o.number_format) : (o.dbkey || "ABC");
    default: return inst.type;
  }
}

// pyEfis text-widget defaults, matched class-by-class so an unset font / size /
// alignment previews exactly what the device draws (fidelity rule):
//   static_text      misc.StaticText        DejaVu Sans Condensed, AlignLeft, full height
//   value_text       misc.ValueDisplay      Open Sans, AlignLeft, 0.9 height
//   numeric_display  gauges.NumericDisplay  DejaVu Sans Condensed, AlignLeft (fits "000")
//   heading_display  hsi.HeadingDisplay     DejaVu Sans Condensed, centred (fits "999")
const TEXT_DEFAULTS = {
  static_text:     { font: "DejaVu Sans Condensed", pct: 1.0 },
  value_text:      { font: "Open Sans",             pct: 0.9 },
  numeric_display: { font: "DejaVu Sans Condensed", pct: 0.85 },
  heading_display: { font: "DejaVu Sans Condensed", pct: 0.75,
                     fg: "#aaaaaa", bg: "#000000", bold: true, framed: true },
};
// Apply an opacity (0-1) to a hex colour -> rgba(); pass-through for names/opaque.
function rgbaFromColor(c, op) {
  if (op == null || op >= 1) return c;
  let h = String(c).trim();
  if (h[0] === "#") {
    if (h.length === 4) h = "#" + h[1] + h[1] + h[2] + h[2] + h[3] + h[3];
    const r = parseInt(h.slice(1, 3), 16), g = parseInt(h.slice(3, 5), 16), b = parseInt(h.slice(5, 7), 16);
    if (![r, g, b].some(Number.isNaN)) return `rgba(${r}, ${g}, ${b}, ${Math.max(0, op)})`;
  }
  return c;
}
// bg_opacity is a percent (0-100) -> 0-1 fraction; default 1 (opaque) when unset.
function bgOpacity(o) {
  return o.bg_opacity != null ? Math.max(0, Math.min(1, Number(o.bg_opacity) / 100)) : 1;
}
const _ALIGN_JUSTIFY = { AlignLeft: "flex-start", AlignCenter: "center", AlignRight: "flex-end" };
function textJustify(inst) {
  if (inst.type === "heading_display") return "center";      // HeadingDisplay centres
  if (inst.type === "static_text")                           // honours its alignment option
    return _ALIGN_JUSTIFY[(inst.options || {}).alignment] || "flex-start";
  return "flex-start";  // value_text + numeric_display are AlignLeft
}

// Live parametric gauges (arc + bar): drawn in the browser from the
// instrument's options, with a sample value + warn/alarm zones. The real value
// and bands are aircraft / FIX data (see #64), so the fill is representative.
const LIVE_GAUGE = new Set(["arc_gauge", "vertical_bar_gauge", "horizontal_bar_gauge"]);
const SVG_NS = "http://www.w3.org/2000/svg";
const GAUGE_FILL = 0.62;  // sample fill fraction (in the green zone)

function sampleGaugeValue(o) {
  const dec = o.decimal_places ?? 0;
  const num = dec > 0 ? (26.8).toFixed(dec) : "268";
  return num + (o.show_units ? "°" : "");
}

function buildBarGauge(inst, vertical) {
  const o = inst.options || {};
  const r = rect(inst);

// Arc gauge -- faithful to pyEfis: a 180-deg sweep with colour zones, a white

<svg viewBox="0 0 100 52" preserveAspectRatio="xMidYMid meet" class="gauge-svg">

// Attitude indicator: sky/ground + roll + pitch ladder + aircraft symbol, drawn
// from a sample pitch/roll. Reflects symbol_color live.
let _svgUid = 0;
function svgFromString(s) { const t = document.createElement("template"); t.innerHTML = s.trim(); return t.content.firstChild; }
function buildAttitude(inst) {
  const o = inst.options || {};
  const sym = o.symbol_color || "#ffff00";
  // Category-3 preview pose from the instrument schema (no live FIX here).
  const meta = (state.schema && state.schema.instruments
    && state.schema.instruments[inst.type]) || {};
  const pv = meta.preview || {};
  const pitch = pv.pitch !== undefined ? pv.pitch : 4;
  const roll = pv.roll !== undefined ? pv.roll : -9;
  const slip = pv.slip !== undefined ? pv.slip : 2;
  const id = _svgUid++;
  // Pitch ladder, option-driven to match AI: viewBox 100 == the visible pitch
  // FOV, ticks at the minor/major/numbered division degrees, lengths from the
  // tick-width options, faded beyond the label range, at the ladder opacity.
  const fov = Number(o.pitchDegreesShown) || 30;
  const ppd = 100 / fov;
  const minorD = Math.max(1, Number(o.minorDiv) || 1);
  const majorD = Math.max(1, Number(o.majorDiv) || 5);
  const numD = Math.max(1, Number(o.numberedDiv) || 10);
  const labelRange = o.visiblePitchAngle != null ? Number(o.visiblePitchAngle) : 15;
  const ladderOp = o.pitchOpacity != null ? Number(o.pitchOpacity) : 0.6;
  const KW = 0.16;  // px tick-width option -> viewBox half-width
  const numHW = (Number(o.numberedDivWidth) || 50) * KW;
  const majHW = (Number(o.majorDivWidth) || 40) * KW;
  const minHW = (Number(o.minorDivWidth) || 10) * KW;
  let ladder = "";
  const span = Math.ceil(fov / 2) + Math.abs(pitch) + numD;
  for (let a = -span; a <= span; a += minorD) {
    if (a === 0) continue;                          // zero line is the horizon
    if (Math.abs(a - pitch) > labelRange) continue; // fade range
    const isNum = a % numD === 0, isMaj = a % majorD === 0;
    const hw = isNum ? numHW : (isMaj ? majHW : minHW);
    const sw = isNum ? 0.7 : (isMaj ? 0.55 : 0.45);
    const y = 50 - a * ppd;
    ladder += `<line x1="${(50 - hw).toFixed(1)}" y1="${y.toFixed(1)}" x2="${(50 + hw).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#fff" stroke-width="${sw}" opacity="${ladderOp}"/>`;
    if (isNum) ladder += `<text x="${(50 - hw - 2).toFixed(1)}" y="${(y + 1.4).toFixed(1)}" fill="#fff" font-size="4" text-anchor="end" opacity="${ladderOp}">${a}</text>`
      + `<text x="${(50 + hw + 2).toFixed(1)}" y="${(y + 1.4).toFixed(1)}" fill="#fff" font-size="4" opacity="${ladderOp}">${a}</text>`;
  }
  let rollarc = "";
  for (const a of [-60, -45, -30, -20, -10, 0, 10, 20, 30, 45, 60]) {
    const maj = (a % 30 === 0), p1 = _polar(50, 50, 45, a), p2 = _polar(50, 50, maj ? 40 : 42.5, a);
    rollarc += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#fff" stroke-width="${maj ? 0.9 : 0.6}"/>`;
  }
  // Standard-rate bank markers (diamonds) -- shown when drawBankMarkers is on,
  // at a representative bank clamped to the max-indicated-bank option (no live
  // TAS in the editor). Fixed on the scale, like the widget.
  let bankMarks = "";
  if (o.drawBankMarkers !== false) {
    const ba = Math.min(15, Number(o.bankAngleMaximum) || 25);
    const ms = (Number(o.bankMarkSize) || 10) * 0.13;
    for (const s of [-1, 1]) {
      const c = _polar(50, 50, 45, s * ba);
      bankMarks += `<path d="M${c.x.toFixed(1)} ${(c.y - ms).toFixed(1)} L${(c.x + ms * 0.7).toFixed(1)} ${c.y.toFixed(1)} L${c.x.toFixed(1)} ${(c.y + ms).toFixed(1)} L${(c.x - ms * 0.7).toFixed(1)} ${c.y.toFixed(1)} Z" fill="none" stroke="#fff" stroke-width="0.6"/>`;
    }

  //   "garmin"   = GI-275/G1000 tapered wedges + boresight ring
  //   "brackets" = GRT-style flat bars with an inboard down-tick (L shapes)
  //   "classic"  = split-wing bars + centre dot (default)
  const symStyle = String(o.aircraft_symbol || "classic").toLowerCase();
  let symbol;
  if (symStyle === "garmin") {
    // Bold GI-275/G1000 trapezoid wings (flat top, taper to blunt outboard
    // tips) + centre dot -- matches ai._draw_aircraft_symbol "garmin".
    symbol = `<g fill="${sym}">
      <polygon points="45,47.25 29,49.3 29,50.7 45,52.75"/>
      <polygon points="55,47.25 71,49.3 71,50.7 55,52.75"/>
      <circle cx="50" cy="50" r="1.2"/>
    </g>`;
  } else if (["brackets", "grt", "l", "l-bracket", "l_bracket"].includes(symStyle)) {
    symbol = `<g fill="${sym}">
      <rect x="29" y="49.25" width="14" height="1.5"/>
      <rect x="41.5" y="49.25" width="1.5" height="3.9"/>
      <rect x="57" y="49.25" width="14" height="1.5"/>
      <rect x="57" y="49.25" width="1.5" height="3.9"/>
      <circle cx="50" cy="50" r="1.05"/>
    </g>`;
  } else {
    symbol = `<g fill="${sym}">
      <rect x="20" y="48.8" width="20" height="2.4" rx="0.5"/>
      <rect x="60" y="48.8" width="20" height="2.4" rx="0.5"/>
      <circle cx="50" cy="50" r="1.4"/>
    </g>`;
  }

    const hLiv = Math.max(hIv, Number(o.horizon_heading_label_interval) || 20);
    const hCol = o.horizon_heading_color || "#ffffff";
    const hTick = (Number(o.horizon_heading_tick_length) || 5) / 5 * 2;

      }
    }
  }
  return svgFromString(`
<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" class="gauge-svg">
  <defs>
    <clipPath id="aic${id}"><rect x="0" y="0" width="100" height="100"/></clipPath>
    <linearGradient id="ais${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1f6fd0"/><stop offset="1" stop-color="#57a0e8"/></linearGradient>
    <linearGradient id="aig${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7d5328"/><stop offset="1" stop-color="#553619"/></linearGradient>
  </defs>

      <rect x="-90" y="50" width="280" height="220" fill="url(#aig${id})"/>
      <line x1="-90" y1="50" x2="190" y2="50" stroke="#fff" stroke-width="1.1"/>
      ${ladder}
      ${headingMarks}
    </g></g>
    <g transform="rotate(${roll} 50 50)">${rollarc}</g>
    ${bankMarks}
    <path d="M47 6 L53 6 L50 11 Z" fill="#fff"/>
    <circle cx="${50 + slip}" cy="14" r="1.5" fill="none" stroke="#fff" stroke-width="0.6"/>
    ${symbol}
    ${fpm}
  </g>
</svg>`);
}

// Vertical tape (airspeed / altimeter): scrolling numbers around a sample value
// with a centred readout box. HTML (not SVG) so the digits never distort.
// Vertical tape. Airspeed adds the V-speed colour bands, a TAS box across the
// bottom (show_tas) and a cyan trend arrow (show_trend) to match the real
// Airspeed_Tape; sample IAS/TAS/trend are category-3 preview.
function buildTape(inst) {
  const o = inst.options || {};
  const isAlt = inst.type === "altimeter_tape";
  const meta = (state.schema && state.schema.instruments && state.schema.instruments[inst.type]) || {};
  const pv = meta.preview || {};
  const value = isAlt ? 3500 : (pv.value ?? 110), step = isAlt ? 200 : 20, span = 6 * step;
  const r = rect(inst);
  const wrap = document.createElement("div");
  wrap.className = "gauge tape" + (isAlt ? " alt" : "");
  wrap.style.fontFamily = '"' + (o.font_family || "DejaVu Sans Condensed") + '"';
  wrap.style.fontSize = Math.max(7, Math.min(14, r.w * 0.24)) + "px";
  if (o.fg_color) wrap.style.color = o.fg_color;
  if (!isAlt) wrap.appendChild(Object.assign(document.createElement("div"), { className: "vbands" }));
  const showTas = !isAlt && o.show_tas !== false;
  const botPad = showTas ? 18 : 0;   // % reserved at the bottom for the TAS box
  const base = Math.round(value / step) * step;
  for (let k = -4; k <= 4; k++) {

  }

  if (showTas) ro.style.top = (50 - botPad / 2) + "%";
  wrap.appendChild(ro);
  if (!isAlt && o.show_trend !== false) {
    const tr = pv.trend ?? 6, trh = Math.max(4, Math.min(22, tr * 1.6));
    const trend = document.createElement("div");
    trend.style.cssText = `position:absolute;left:9.5%;width:3px;background:#34d3ff;top:${50 - botPad / 2 - trh}%;height:${trh}%;`;
    const head = document.createElement("div");
    head.style.cssText = `position:absolute;left:8.2%;top:${50 - botPad / 2 - trh}%;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:5px solid #34d3ff;`;
    wrap.appendChild(trend); wrap.appendChild(head);
  }
  if (showTas) {
    const tas = document.createElement("div");
    tas.style.cssText = `position:absolute;left:0;right:0;bottom:0;height:${botPad}%;background:#fff;color:#1e1e1e;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;`;

function headingLabel(d) {
  d = ((d % 360) + 360) % 360;
  return ({ 0: "N", 90: "E", 180: "S", 270: "W" })[d] || String(d / 10);
}

// Heading tape: a horizontal compass strip scrolling around a sample heading,
// with a lubber index + readout box. HTML so the labels stay crisp.
function buildHeadingTape(inst) {
  const o = inst.options || {};
  const heading = 87, span = 90;
  const r = rect(inst);
  const wrap = document.createElement("div");
  wrap.className = "gauge htape";
  wrap.style.fontFamily = '"' + (o.font_family || "DejaVu Sans Condensed") + '"';
  wrap.style.fontSize = Math.max(7, Math.min(14, r.h * 0.3)) + "px";
  if (o.fg_color) wrap.style.color = o.fg_color;
  const base = Math.round(heading / 10) * 10;
  for (let hd = base - 50; hd <= base + 50; hd += 10) {
    const left = 50 + (hd - heading) / span * 100;
    if (left < 2 || left > 98) continue;
    const norm = ((hd % 360) + 360) % 360, maj = norm % 30 === 0, card = norm % 90 === 0;
    const tk = document.createElement("div");
    tk.className = "htk" + (maj ? " maj" : "");
    tk.style.left = left + "%";
    const bar = document.createElement("span"); bar.className = "bar"; tk.appendChild(bar);
    if (maj) { const lbl = document.createElement("span"); lbl.className = "lbl" + (card ? " card" : ""); lbl.textContent = headingLabel(norm); tk.appendChild(lbl); }
    wrap.appendChild(tk);
  }
  wrap.appendChild(Object.assign(document.createElement("div"), { className: "hlubber" }));
  return wrap;
}

// Horizontal situation indicator -- faithful to the pyEfis HSI widget: a
// rotating compass card (ticks + labels), a small selected-course pointer
// (course_color, driven by COURSE), fixed yellow lubber index marks, the
// CDI/GSI cross-pointer deviation needles over a centre deviation scale, and an
// optional Garmin-style cyan heading bug (heading_bug_color). With
// source_auto_color on (default) the course pointer + CDI/GSI are coloured by
// nav source -- the preview shows a GPS source (magenta); a VOR/LOC source uses
// vloc_color (green). Off, the needles use needle_color. Reflects fg_color,
// bg_opacity and the cdi/gsi toggles.

  const needleC = o.needle_color || "#ffff00";
  const needleW = (o.needle_width != null ? Number(o.needle_width) : 3) * 0.4;
  const courseC = o.course_color || "#ff00ff";

  // is course_color (magenta). On (default), the course pointer + CDI/GSI use the
  // source colour; off, the CDI/GSI fall back to needle_color. (vloc_color, for a
  // VOR/LOC source, is not shown by the static GPS preview.)

  for (let d = 0; d < 360; d += 10) {
    const maj = d % 30 === 0;

    ticks += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${fg}" stroke-width="${maj ? 1 : 0.5}"/>`;
    if (maj) { const lp = _polar(50, 50, 34, d); ticks += `<text x="${lp.x}" y="${lp.y + 2}" fill="${fg}" font-size="6" text-anchor="middle">${headingLabel(d)}</text>`; }
  }

  const cb1 = _polar(50, 50, 47, cA + 3.5), cb2 = _polar(50, 50, 47, cA - 3.5), cap = _polar(50, 50, 42, cA);
  let pointers = `<path d="M${cb1.x} ${cb1.y} L${cb2.x} ${cb2.y} L${cap.x} ${cap.y} Z" fill="${courseC}"/>`;
  // Garmin-style heading bug (cyan, notched), card space, inside the ring.

    const hA = headbug - heading;
    const oA = _polar(50, 50, 48, hA + 3.5), oB = _polar(50, 50, 48, hA - 3.5);
    const iA = _polar(50, 50, 44, hA + 3.5), iB = _polar(50, 50, 44, hA - 3.5);
    const nA = _polar(50, 50, 48, hA + 1.3), nB = _polar(50, 50, 48, hA - 1.3), nm = _polar(50, 50, 45.5, hA);

  }

    lubber += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#ffff00" stroke-width="1.5"/>`;
  }

  for (const dv of [-1, -2/3, -1/3, 1/3, 2/3, 1]) {
    const hx = 50 + dv * dev, vy = 50 + dv * dev;
    nav += `<line x1="${hx}" y1="48.5" x2="${hx}" y2="51.5" stroke="${fg}" stroke-width="0.4"/>`;
    nav += `<line x1="48.5" y1="${vy}" x2="51.5" y2="${vy}" stroke="${fg}" stroke-width="0.4"/>`;
  }
  if (o.cdi_enabled !== false) {
    const x = 50 + cdi * dev;

// Round dials + trend tape -- faithful to pyEfis steam-gauge faces (rendered
// real first in work/refs/ and matched). Sample values; live data is FIX (#64).
function _dialText(cx, cy, r, deg, s, size, fg) {

function buildAirspeedDial(inst) {

    + `<path d="${_arcCW(50, 50, 45, d(120), d(145))}" stroke="#e8c21a" stroke-width="3" fill="none"/>`
    + `<path d="${_arcCW(50, 50, 45, d(145), d(160))}" stroke="#e0231f" stroke-width="3" fill="none"/>`;

// Standard "basic-T" arrangement (grid units): attitude centre, airspeed left,
// altimeter right, HSI below, heading top. A starting template + a guide.
const BASIC_T = [
  { type: "atitude_indicator", row: 6, column: 68, span: { rows: 64, columns: 64 } },
  { type: "airspeed_tape", row: 10, column: 6, span: { rows: 56, columns: 16 } },

// --- composition guides (static overlay) ------------------------------------
function guideBox(parent, lf, tf, wf, hf, label) {
  const b = document.createElement("div"); b.className = "guide-box";
  b.style.left = (lf * 100) + "%"; b.style.top = (tf * 100) + "%";
  b.style.width = (wf * 100) + "%"; b.style.height = (hf * 100) + "%";
  if (label) { const s = document.createElement("span"); s.className = "guide-label"; s.textContent = label; b.appendChild(s); }
  parent.appendChild(b);
}

function renderGuides() {
  const g = $("guides"); g.innerHTML = "";
  const m = state.guides, V = [], H = [];
  if (m === "center") { V.push(0.5); H.push(0.5); }
  else if (m === "thirds") { V.push(1 / 3, 2 / 3); H.push(1 / 3, 2 / 3); }
  else if (m === "golden") { V.push(0.382, 0.618); H.push(0.382, 0.618); }
  else if (m === "basic-t") {
    for (const t of BASIC_T) {
      guideBox(g, t.column / state.layout.columns, t.row / state.layout.rows,
               t.span.columns / state.layout.columns, t.span.rows / state.layout.rows);
    }
  } else if (m === "pfd-ems") {
    // Primary flight (attitude/airspeed/altitude) in the top-left two-thirds;
    // engine/aux in the right third and the bottom third.
    guideBox(g, 0, 0, 2 / 3, 2 / 3, "Primary (PFD)");
    guideBox(g, 2 / 3, 0, 1 / 3, 1, "EMS / aux");
    guideBox(g, 0, 2 / 3, 2 / 3, 1 / 3, "EMS / aux");
  }
  for (const f of V) { const d = document.createElement("div"); d.className = "guide-v"; d.style.left = (f * 100) + "%"; g.appendChild(d); }
  for (const f of H) { const d = document.createElement("div"); d.className = "guide-h"; d.style.top = (f * 100) + "%"; g.appendChild(d); }
}

// --- smart alignment (snap-to-object/guide while dragging) -------------------
function alignTargets() {
  const cols = state.layout.columns, rows = state.layout.rows;
  const V = [0, cols / 2, cols], H = [0, rows / 2, rows];   // canvas edges + centre
  const m = state.guides;
  if (m === "thirds") { V.push(cols / 3, 2 * cols / 3); H.push(rows / 3, 2 * rows / 3); }
  else if (m === "golden") { V.push(cols * 0.382, cols * 0.618); H.push(rows * 0.382, rows * 0.618); }
  else if (m === "basic-t") {
    for (const t of BASIC_T) {
      V.push(t.column, t.column + t.span.columns / 2, t.column + t.span.columns);
      H.push(t.row, t.row + t.span.rows / 2, t.row + t.span.rows);
    }
  } else if (m === "pfd-ems") { V.push(cols * 2 / 3); H.push(rows * 2 / 3); }
  state.instruments.forEach((o, idx) => {
    if (idx === state.selected) return;
    V.push(o.column, o.column + o.span.columns / 2, o.column + o.span.columns);
    H.push(o.row, o.row + o.span.rows / 2, o.row + o.span.rows);
  });
  return { V, H };
}

function snapAlign(inst, col, row, gw, gh) {
  const tolC = 6 / gw, tolR = 6 / gh;
  const { V, H } = alignTargets();
  let outCol = col, outRow = row, vg = null, hg = null, bestC = tolC, bestR = tolR;
  const anchorsC = [[col, 0], [col + inst.span.columns / 2, inst.span.columns / 2], [col + inst.span.columns, inst.span.columns]];
  for (const line of V) for (const [a, off] of anchorsC) {
    const d = Math.abs(a - line);
    if (d <= bestC) { bestC = d; outCol = line - off; vg = line; }
  }
  const anchorsR = [[row, 0], [row + inst.span.rows / 2, inst.span.rows / 2], [row + inst.span.rows, inst.span.rows]];
  for (const line of H) for (const [a, off] of anchorsR) {
    const d = Math.abs(a - line);
    if (d <= bestR) { bestR = d; outRow = line - off; hg = line; }
  }
  return { col: outCol, row: outRow, vg, hg };
}

function drawAlign(vg, hg) {
  const a = $("align"); a.innerHTML = "";
  if (vg != null) { const d = document.createElement("div"); d.className = "align-v"; d.style.left = (vg / state.layout.columns * 100) + "%"; a.appendChild(d); }
  if (hg != null) { const d = document.createElement("div"); d.className = "align-h"; d.style.top = (hg / state.layout.rows * 100) + "%"; a.appendChild(d); }
}
function clearAlign() { $("align").innerHTML = ""; }

// Common Pi-panel resolutions + sizes (the canvas adopts the chosen aspect;
// pyEfis maps the 200x110 grid onto the real screen, so aspect is what drives
// the visual layout -- absolute pixels are normalised away).
const RESOLUTIONS = [
  { w: 800, h: 480 }, { w: 1024, h: 600 }, { w: 1280, h: 800 }, { w: 1280, h: 1024 },
  { w: 1920, h: 1080 }, { w: 1920, h: 1200 },
];
const INCHES = [5, 7, 8, 10.1, 11.6, 15.6, 21.5];

function gcd(a, b) { return b ? gcd(b, a % b) : a; }
function aspect(w, h) { const g = gcd(w, h), aw = w / g, ah = h / g; return ah <= 20 ? `${aw}:${ah}` : `${(w / h).toFixed(2)}:1`; }
function dpi() { return state.screen.inches ? Math.round(Math.hypot(state.screen.width, state.screen.height) / state.screen.inches) : null; }

function buildScreenControls() {
  const res = $("res");
  res.innerHTML = "";
  for (const r of RESOLUTIONS) {
    const o = document.createElement("option");
    o.value = r.w + "x" + r.h; o.textContent = r.w + " × " + r.h;
    res.appendChild(o);
  }
  const custom = document.createElement("option"); custom.value = "custom"; custom.textContent = "Custom…"; res.appendChild(custom);
  const inch = $("inches");
  inch.innerHTML = "";
  const none = document.createElement("option"); none.value = ""; none.textContent = "— in"; inch.appendChild(none);
  for (const i of INCHES) { const o = document.createElement("option"); o.value = i; o.textContent = i + "″"; inch.appendChild(o); }
  res.addEventListener("change", onResChange);
  inch.addEventListener("change", () => { state.screen.inches = parseFloat($("inches").value) || null; applyScreen(); });
  $("cw").addEventListener("input", onCustom);
  $("ch").addEventListener("input", onCustom);
  syncScreenControls();
}

function onResChange() {
  const v = $("res").value;
  if (v === "custom") { $("custom").classList.remove("hidden"); $("cw").value = state.screen.width; $("ch").value = state.screen.height; return; }
  $("custom").classList.add("hidden");
  const [w, h] = v.split("x").map(Number);
  state.screen.width = w; state.screen.height = h; applyScreen();
}
function onCustom() {
  const w = parseInt($("cw").value, 10), h = parseInt($("ch").value, 10);
  if (w > 0 && h > 0) { state.screen.width = w; state.screen.height = h; applyScreen(); }
}
function syncScreenControls() {
  const key = state.screen.width + "x" + state.screen.height;
  if ([...$("res").options].some((o) => o.value === key)) { $("res").value = key; $("custom").classList.add("hidden"); }
  else { $("res").value = "custom"; $("custom").classList.remove("hidden"); $("cw").value = state.screen.width; $("ch").value = state.screen.height; }
  $("inches").value = state.screen.inches || "";
}
function applyScreen() { sizeCanvas(); renderCanvas(); renderProps(); updateReadout(); }
function updateReadout() {
  const d = dpi();
  $("readout").textContent =
    `${state.screen.width}×${state.screen.height} · ${aspect(state.screen.width, state.screen.height)}`
    + (d ? ` · ${state.screen.inches}″ · ${d} DPI` : "");
}

// --- grid <-> pixel math (port of screenbuilder_layout, ratio=false) --------
function cell() { return { gw: state.canvasW / state.layout.columns, gh: state.canvasH / state.layout.rows }; }
function rect(inst) {
  const { gw, gh } = cell();
  return {
    x: gw * inst.column, y: gh * inst.row,
    w: gw * (inst.span?.columns ?? 1), h: gh * (inst.span?.rows ?? 1),
  };
}

// --- palette ----------------------------------------------------------------
function renderPalette() {
  const pal = $("palette");
  pal.innerHTML = "";

  if (state.groups.length) {
    const h = document.createElement("h3"); h.textContent = "groups"; pal.appendChild(h);
    for (const g of state.groups) {
      const item = document.createElement("div"); item.className = "pal-item"; item.draggable = true;
      item.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", "group:" + g.id));
      const box = document.createElement("div"); box.className = "pal-group";
      for (const ch of g.instruments) {
        const ci = document.createElement("img"); ci.src = `${ASSETS}/palette/${ch.type}.svg`;
        ci.style.left = (ch.column / g.grid.columns * 100) + "%"; ci.style.top = (ch.row / g.grid.rows * 100) + "%";
        ci.style.width = (ch.span.columns / g.grid.columns * 100) + "%"; ci.style.height = (ch.span.rows / g.grid.rows * 100) + "%";
        box.appendChild(ci);
      }
      const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = g.label;
      item.append(box, lbl); pal.appendChild(item);
    }
  }

  const byCat = {};
  for (const [type, meta] of Object.entries(state.schema.instruments)) {
    if (meta.hidden) continue;  // system-managed (e.g. the data-management boot screen)
    (byCat[meta.category] ||= []).push([type, meta]);
  }
  for (const cat of Object.keys(byCat).sort()) {
    const h = document.createElement("h3"); h.textContent = cat; pal.appendChild(h);
    for (const [type, meta] of byCat[cat].sort((a, b) => a[1].label.localeCompare(b[1].label))) {
      const item = document.createElement("div");
      item.className = "pal-item";
      item.draggable = true;
      item.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", type));
      const img = document.createElement("img");
      img.src = `${ASSETS}/palette/${type}.svg`; img.alt = type;
      const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = meta.label;
      item.append(img, lbl);
      pal.appendChild(item);
    }
  }
}

// --- canvas -----------------------------------------------------------------
function sizeCanvas() {
  // Canvas adopts the TARGET screen's aspect ratio (the 200x110 grid maps onto
  // it), scaled to fit the available editor area.
  const c = $("canvas");
  const stage = c.parentElement;
  const availW = stage.clientWidth - 36;
  const availH = stage.clientHeight - 36;
  const ar = state.screen.width / state.screen.height;
  let w = Math.min(availW, 1400), h = w / ar;
  if (h > availH) { h = availH; w = h * ar; }
  state.canvasW = Math.round(w);
  state.canvasH = Math.round(h);
  c.style.width = state.canvasW + "px";
  c.style.height = state.canvasH + "px";
  const cw = state.canvasW / state.layout.columns, ch = state.canvasH / state.layout.rows;
  c.style.setProperty("--cw", cw + "px");
  c.style.setProperty("--ch", ch + "px");
  c.style.setProperty("--cw10", cw * 10 + "px");
  c.style.setProperty("--ch10", ch * 10 + "px");
}

function renderCanvas() {
  const c = $("canvas");
  c.querySelectorAll(".inst").forEach((e) => e.remove());
  state.instruments.forEach((inst, i) => {
    const meta = state.schema.instruments[inst.type] || {};
    const el = document.createElement("div");
    el.className = "inst" + (meta.offscreen_renderable ? "" : " placeholder") + (meta.keep_aspect ? " lock" : "");
    if (i === state.selected) el.classList.add("sel");
    el.dataset.i = i;
    positionEl(el, inst);
    if (inst.type === "group") {
      el.classList.add("group");
      const def = state.groupsById[inst.id];
      if (def) for (const ch of def.instruments) {
        const ci = document.createElement("img"); ci.className = "gchild";
        ci.src = `${ASSETS}/palette/${ch.type}.svg`;
        ci.style.left = (ch.column / def.grid.columns * 100) + "%"; ci.style.top = (ch.row / def.grid.rows * 100) + "%";
        ci.style.width = (ch.span.columns / def.grid.columns * 100) + "%"; ci.style.height = (ch.span.rows / def.grid.rows * 100) + "%";
        el.appendChild(ci);
      }
    } else if (inst.type === "atitude_indicator") {
      el.appendChild(buildAttitude(inst));
    } else if (inst.type === "virtual_vfr") {
      el.appendChild(buildVirtualVfr(inst));
    } else if (inst.type === "airspeed_tape" || inst.type === "altimeter_tape") {
      el.appendChild(buildTape(inst));
    } else if (inst.type === "heading_tape") {
      el.appendChild(buildHeadingTape(inst));
    } else if (inst.type === "horizontal_situation_indicator") {
      el.appendChild(buildHSI(inst));
    } else if (inst.type === "airspeed_dial") {
      el.appendChild(buildAirspeedDial(inst));
    } else if (inst.type === "altimeter_dial") {
      el.appendChild(buildAltimeterDial(inst));
    } else if (inst.type === "vsi_dial") {
      el.appendChild(buildVsiDial(inst));
    } else if (inst.type === "turn_coordinator") {
      el.appendChild(buildTurnCoordinator(inst));
    } else if (inst.type === "altimeter_trend_tape") {
      el.appendChild(buildTrendTape(inst));
    } else if (inst.type === "vsi_pfd") {
      el.appendChild(buildVsiPfd(inst));
    } else if (inst.type === "wind_display") {
      el.appendChild(buildWind(inst));
    } else if (inst.type === "airspeed_trend_tape") {
      el.appendChild(buildAirspeedTrend(inst));
    } else if (inst.type === "airspeed_box") {
      el.appendChild(buildAirspeedBox(inst));
    } else if (LIVE_GAUGE.has(inst.type)) {
      el.appendChild(inst.type === "arc_gauge"
        ? buildArcGauge(inst)
        : buildBarGauge(inst, inst.type === "vertical_bar_gauge"));
    } else if (LIVE_TEXT.has(inst.type)) {
      const o = inst.options;
      const def = TEXT_DEFAULTS[inst.type] || { font: "DejaVu Sans Condensed", pct: 0.5 };
      const content = document.createElement("div");
      content.className = "inst-text";
      content.style.fontFamily = '"' + (o.font_family || def.font) + '"';
      const fg = o.fg_color || def.fg;
      if (fg) content.style.color = fg;
      // Background fill honours bg_opacity (heading_display): 0 = transparent so
      // the screen behind shows through, like the widget. The fg-coloured frame
      // stays for legibility, matching HeadingDisplay's drawRect outline.
      const bgc = o.bg_color || def.bg;
      if (bgc) content.style.background =
        rgbaFromColor(bgc, bgOpacity(o));
      if (def.bold) content.style.fontWeight = "bold";
      if (def.framed) {
        content.style.boxSizing = "border-box";
        content.style.border = "1px solid " + (fg || "#aaaaaa");
      }
      // font_percent: whole-number percent (40) or legacy fraction (0.40).
      const _vh = rect(inst).h;
      let _fp = o.font_percent != null ? Number(o.font_percent) : def.pct;
      if (_fp > 1) _fp = _fp / 100;
      content.style.fontSize = Math.max(8, _fp * _vh) + "px";
      content.style.justifyContent = textJustify(inst);
      // value_text: optional box (border + background) on the widget bounds.
      // bg_opacity defaults to 0 (transparent), matching misc.ValueDisplay.
      if (inst.type === "value_text") {
        const _bgo = o.bg_opacity != null ? Math.max(0, Math.min(1, Number(o.bg_opacity) / 100)) : 0;
        content.style.background = o.bg_color ? rgbaFromColor(o.bg_color, _bgo) : "transparent";
        const _bw = Number(o.border_width) || 0;
        if (_bw > 0) {
          content.style.boxSizing = "border-box";
          const _bo = o.border_opacity != null ? Math.max(0, Math.min(1, Number(o.border_opacity) / 100)) : 1;
          content.style.border = _bw + "px solid " + rgbaFromColor(o.border_color || "#ffffff", _bo);
        } else {
          content.style.border = "none";
        }
      }
      // value_text: optional prefix label (own font/size/colour) drawn before
      // the value, plus a configurable value colour -- matches misc.ValueDisplay.
      if (inst.type === "value_text" && o.prefix_text) {
        content.style.alignItems = "baseline";
        const pre = document.createElement("span");
        pre.textContent = o.prefix_text;
        pre.style.fontFamily = '"' + (o.prefix_font_family || o.font_family || def.font) + '"';
        pre.style.color = o.prefix_color || "#ffffff";
        let _pfp = o.prefix_font_percent != null ? Number(o.prefix_font_percent) : 50;
        if (_pfp > 1) _pfp = _pfp / 100;
        pre.style.fontSize = Math.max(6, _pfp * _vh) + "px";
        pre.style.marginRight = "0.3em";
        content.appendChild(pre);
        const valSpan = document.createElement("span");
        valSpan.textContent = sampleText(inst);
        if (o.value_color) valSpan.style.color = o.value_color;
        content.appendChild(valSpan);
      } else {
        content.textContent = sampleText(inst);
        if (inst.type === "value_text" && o.value_color) content.style.color = o.value_color;
      }
      el.appendChild(content);
    } else {
      const content = document.createElement("img");
      content.src = `${ASSETS}/palette/${inst.type}.svg`; content.alt = inst.type;
      el.appendChild(content);
    }
    const handle = document.createElement("div"); handle.className = "handle";
    el.appendChild(handle);
    el.addEventListener("mousedown", (e) => startMove(e, i, el));
    handle.addEventListener("mousedown", (e) => startResize(e, i, el));
    c.appendChild(el);
  });
  syncCode();
}

function positionEl(el, inst) {
  const r = rect(inst);
  el.style.left = r.x + "px"; el.style.top = r.y + "px";
  el.style.width = r.w + "px"; el.style.height = r.h + "px";
}

// --- drag from palette ------------------------------------------------------
const canvas = $("canvas");
canvas.addEventListener("dragover", (e) => { e.preventDefault(); canvas.classList.add("dragover"); });
canvas.addEventListener("dragleave", () => canvas.classList.remove("dragover"));
canvas.addEventListener("drop", (e) => {
  e.preventDefault(); canvas.classList.remove("dragover");
  const data = e.dataTransfer.getData("text/plain");
  const cr = canvas.getBoundingClientRect();
  const { gw, gh } = cell();
  const col = clamp(snapTo((e.clientX - cr.left) / gw), 0, state.layout.columns - 1);
  const row = clamp(snapTo((e.clientY - cr.top) / gh), 0, state.layout.rows - 1);
  if (data.startsWith("group:")) {
    const def = state.groupsById[data.slice(6)];
    if (!def) return;
    const sp = def.defaultSpan || { rows: 40, columns: 50 };
    state.instruments.push({ type: "group", id: def.id, row, column: col, span: { rows: sp.rows, columns: sp.columns } });
  } else if (state.schema.instruments[data]) {
    state.instruments.push({ type: data, row, column: col, span: { rows: 20, columns: 20 }, options: {} });
  } else { return; }
  state.selected = state.instruments.length - 1;
  renderCanvas(); renderProps();
});

// --- move / resize ----------------------------------------------------------
function startMove(e, i, el) {
  if (e.target.classList.contains("handle")) return;
  e.preventDefault();
  select(i);
  const { gw, gh } = cell();
  const inst = state.instruments[i];
  const sx = e.clientX, sy = e.clientY, srow = inst.row, scol = inst.column;
  const move = (ev) => {
    const col = clamp(snapTo(scol + (ev.clientX - sx) / gw), 0, state.layout.columns - inst.span.columns);
    const row = clamp(snapTo(srow + (ev.clientY - sy) / gh), 0, state.layout.rows - inst.span.rows);
    const a = snapAlign(inst, col, row, gw, gh);   // snap to objects / guides when close
    inst.column = clamp(a.col, 0, state.layout.columns - inst.span.columns);
    inst.row = clamp(a.row, 0, state.layout.rows - inst.span.rows);
    positionEl(el, inst); syncPosFields(inst);
    drawAlign(a.vg, a.hg);
  };
  const up = () => { clearAlign(); syncCode(); document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); };
  document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
}

function startResize(e, i, el) {
  e.preventDefault(); e.stopPropagation();
  select(i);
  const { gw, gh } = cell();
  const inst = state.instruments[i];
  const sx = e.clientX, sy = e.clientY, sc = inst.span.columns, sr = inst.span.rows;
  const move = (ev) => {
    inst.span.columns = clamp(snapTo(sc + (ev.clientX - sx) / gw), 1, state.layout.columns);
    inst.span.rows = clamp(snapTo(sr + (ev.clientY - sy) / gh), 1, state.layout.rows);
    positionEl(el, inst); syncPosFields(inst);
  };
  const up = () => { syncCode(); document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); };
  document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
}

function select(i) {
  state.selected = i;
  document.querySelectorAll(".inst").forEach((el) => el.classList.toggle("sel", Number(el.dataset.i) === i));
  renderProps();
}

// --- properties panel -------------------------------------------------------
function renderProps() {
  const p = $("props");
  p.innerHTML = "";

  // Layers (z-order). pyEfis has no z-index: paint order IS list order, so
  // these reorder the instruments array, which serialises straight to YAML.
  if (state.instruments.length) {
    const lh = document.createElement("h3"); lh.textContent = "Layers (top = front)"; p.appendChild(lh);
    const tools = document.createElement("div"); tools.className = "row layer-tools";
    for (const [lbl, where, tip] of [["⤒", "front", "Bring to front"], ["↑", "up", "Forward"], ["↓", "down", "Backward"], ["⤓", "back", "Send to back"]]) {
      const b = document.createElement("button");
      b.textContent = lbl; b.title = tip; b.disabled = state.selected < 0;
      b.addEventListener("click", () => moveSelected(where));
      tools.appendChild(b);
    }
    p.appendChild(tools);
    const list = document.createElement("ul"); list.className = "layers";
    for (let i = state.instruments.length - 1; i >= 0; i--) {   // top = last = front
      const inst = state.instruments[i];
      const li = document.createElement("li");
      li.className = "layer" + (i === state.selected ? " sel" : "");
      li.textContent = state.schema.instruments[inst.type]?.label
        || (inst.type === "group" ? (state.groupsById[inst.id]?.label || "Group") : inst.type);
      li.addEventListener("click", () => select(i));
      list.appendChild(li);
    }
    p.appendChild(list);
  }

  // Per-selection properties
  if (state.selected < 0 || !state.instruments[state.selected]) {
    const hint = document.createElement("p"); hint.className = "empty";
    hint.textContent = state.instruments.length
      ? "Select an instrument to edit its properties."
      : "Drag an instrument from the left onto the canvas.";
    p.appendChild(hint);
    return;
  }
  const inst = state.instruments[state.selected];
  p.appendChild(Object.assign(document.createElement("hr"), { className: "sep" }));

  if (inst.type === "group") {
    const def = state.groupsById[inst.id];
    const gt = document.createElement("h3"); gt.textContent = (def ? def.label : "Group") + " — group"; p.appendChild(gt);
    p.appendChild(numGrid([
      ["row", inst.row, (v) => inst.row = v],
      ["column", inst.column, (v) => inst.column = v],
      ["span rows", inst.span.rows, (v) => inst.span.rows = v],
      ["span cols", inst.span.columns, (v) => inst.span.columns = v],
    ]));
    const ung = document.createElement("button");
    ung.textContent = "Ungroup"; ung.style.marginTop = "8px";
    ung.addEventListener("click", ungroup);
    p.appendChild(ung);
    return;
  }

  const meta = state.schema.instruments[inst.type];
  const title = document.createElement("h3"); title.textContent = meta.label + " — properties"; p.appendChild(title);

  const d = dpi();
  if (d) {
    const pw = (inst.span.columns / state.layout.columns) * state.screen.width / d * 25.4;
    const ph = (inst.span.rows / state.layout.rows) * state.screen.height / d * 25.4;
    const note = document.createElement("p");
    note.className = "muted"; note.style.margin = "0 0 8px";
    note.textContent = `≈ ${pw.toFixed(0)} × ${ph.toFixed(0)} mm on the ${state.screen.inches}″ screen`;
    p.appendChild(note);
  }

  p.appendChild(numGrid([
    ["row", inst.row, (v) => inst.row = v],
    ["column", inst.column, (v) => inst.column = v],
    ["span rows", inst.span.rows, (v) => inst.span.rows = v],
    ["span cols", inst.span.columns, (v) => inst.span.columns = v],
  ]));

  // Instruments loaded from a template/saved config can omit the options block;
  // make it a real object so the fields render AND edits have somewhere to land.
  inst.options = inst.options || {};
  const opts = { ...state.schema.common_options, ...meta.options };
  if (Object.keys(opts).length) {
    const h = document.createElement("h3"); h.textContent = "Options"; p.appendChild(h);
    for (const [name, spec] of Object.entries(opts)) p.appendChild(optionField(inst, name, spec));
  }
}

// Reorder the selected instrument in the array (= change paint order).
function moveSelected(where) {
  const i = state.selected;
  if (i < 0) return;
  const arr = state.instruments;
  const item = arr.splice(i, 1)[0];
  let j;
  if (where === "front") j = arr.length;          // last = painted on top
  else if (where === "back") j = 0;
  else if (where === "up") j = Math.min(arr.length, i + 1);
  else j = Math.max(0, i - 1);
  arr.splice(j, 0, item);
  state.selected = j;
  renderCanvas(); renderProps();
}

// Ungroup: replace the selected group with its children as independent
// top-level instruments (child local positions -> absolute grid).
function ungroup() {
  const g = state.instruments[state.selected];
  if (!g || g.type !== "group") return;
  const def = state.groupsById[g.id];
  if (!def) return;
  const children = def.instruments.map((ch) => ({
    type: ch.type,
    row: g.row + (ch.row / def.grid.rows) * g.span.rows,
    column: g.column + (ch.column / def.grid.columns) * g.span.columns,
    span: {
      rows: (ch.span.rows / def.grid.rows) * g.span.rows,
      columns: (ch.span.columns / def.grid.columns) * g.span.columns,
    },
    options: { ...(ch.options || {}) },
  }));
  state.instruments.splice(state.selected, 1, ...children);
  state.selected = -1;
  renderCanvas(); renderProps();
}

function numGrid(rows) {
  const wrap = document.createElement("div"); wrap.className = "grid2";
  for (const [label, value, set] of rows) {
    const f = document.createElement("div"); f.className = "field";
    const l = document.createElement("label"); l.textContent = label;
    const inp = document.createElement("input"); inp.type = "number"; inp.value = value;
    inp.addEventListener("input", () => {
      const v = parseFloat(inp.value); if (!isNaN(v)) { set(v); repositionSelected(); syncCode(); }
    });
    f.append(l, inp); wrap.appendChild(f);
  }
  return wrap;
}

// Shared <datalist> behind every fixkey input: a type-ahead over the FIX key
// catalog (dumped from the fix-gateway database). Type to filter by key; the
// description + units show alongside in the dropdown.
function buildFixKeyDatalist() {
  let dl = document.getElementById("fixkeys");
  if (!dl) { dl = document.createElement("datalist"); dl.id = "fixkeys"; document.body.appendChild(dl); }
  dl.innerHTML = "";
  for (const k of (state.fixKeys || [])) {
    const op = document.createElement("option");
    op.value = k.key;
    const u = k.units ? ` (${k.units})` : "";
    if (k.description || u) op.label = (k.description || "") + u;
    dl.appendChild(op);
  }
}

function optionField(inst, name, spec) {
  const f = document.createElement("div"); f.className = "field";
  const l = document.createElement("label"); l.textContent = spec.label || name;
  // Property help: a circle-i info icon carrying spec.help (sourced from the
  // pyEfis Prop.help spec) as a hover tooltip.
  if (spec.help) {
    const info = document.createElement("span");
    info.className = "info"; info.title = spec.help; info.setAttribute("aria-label", spec.help);
    info.innerHTML = '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="4.7" r="0.95" fill="currentColor"/><rect x="7.2" y="6.7" width="1.6" height="5" rx="0.8" fill="currentColor"/></svg>';
    l.appendChild(info);
  }
  f.appendChild(l);
  const cur = (inst.options || {})[name];
  let inp;
  if (spec.type === "boolean") {
    inp = document.createElement("input"); inp.type = "checkbox";
    inp.checked = cur !== undefined ? !!cur : !!spec.default;
    inp.addEventListener("change", () => setOpt(inst, name, inp.checked));
  } else if (spec.type === "enum") {
    inp = document.createElement("select");
    for (const o of spec.enum) { const op = document.createElement("option"); op.value = o; op.textContent = o; inp.appendChild(op); }
    inp.value = cur ?? spec.default ?? spec.enum[0];
    inp.addEventListener("change", () => setOpt(inst, name, inp.value));
  } else if (spec.type === "color") {
    inp = document.createElement("input"); inp.type = "color";
    inp.value = (cur ?? spec.default ?? "#000000").slice(0, 7);
    inp.addEventListener("input", () => setOpt(inst, name, inp.value));
  } else if (spec.type === "number") {
    inp = document.createElement("input"); inp.type = "number"; if (spec.step) inp.step = spec.step;
    inp.placeholder = spec.default ?? "";
    if (cur !== undefined) inp.value = cur;
    inp.addEventListener("input", () => setOpt(inst, name, inp.value === "" ? undefined : parseFloat(inp.value)));
  } else if (spec.type === "fixkey") {
    // Type-ahead over the FIX key catalog (datalist#fixkeys), still free-text
    // so a key the catalog doesn't list can be entered.
    inp = document.createElement("input"); inp.type = "text";
    inp.setAttribute("list", "fixkeys");
    inp.setAttribute("autocomplete", "off");
    inp.placeholder = spec.default || "FIX key";
    if (cur !== undefined) inp.value = cur;
    inp.addEventListener("input", () => setOpt(inst, name, inp.value === "" ? undefined : inp.value));
  } else {
    inp = document.createElement("input"); inp.type = "text";
    inp.placeholder = spec.default ?? "";
    if (cur !== undefined) inp.value = cur;
    inp.addEventListener("input", () => setOpt(inst, name, inp.value === "" ? undefined : inp.value));
  }
  f.appendChild(inp);
  return f;
}

function setOpt(inst, name, value) {
  if (value === undefined) delete inst.options[name];
  else inst.options[name] = value;
  renderCanvas();   // redraw live instruments (text + gauges) and sync the code
}

function syncPosFields(inst) {
  const inputs = $("props").querySelectorAll(".grid2 input");
  if (inputs.length === 4) {
    inputs[0].value = inst.row; inputs[1].value = inst.column;
    inputs[2].value = inst.span.rows; inputs[3].value = inst.span.columns;
  }
}
function repositionSelected() {
  const el = document.querySelector(`.inst[data-i="${state.selected}"]`);
  if (el) positionEl(el, state.instruments[state.selected]);
}

// --- delete / save / load ---------------------------------------------------
$("del").addEventListener("click", () => {
  if (state.selected < 0) return;
  state.instruments.splice(state.selected, 1); state.selected = -1;
  renderCanvas(); renderProps();
});
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if ((e.key === "Delete" || e.key === "Backspace") && state.selected >= 0) $("del").click();
  else if (e.key === "]" && state.selected >= 0) moveSelected("up");      // forward
  else if (e.key === "[" && state.selected >= 0) moveSelected("down");    // backward
});

$("guides-sel").addEventListener("change", (e) => { state.guides = e.target.value; renderGuides(); });

$("save").addEventListener("click", save);
async function save() {
  if (!deviceId) { setStatus("No device - open the editor from a project."); return; }
  setStatus("Saving...");
  // Store the native pyEfis YAML (what the device runs), not a separate design.
  const res = await fetch(`/api/devices/${deviceId}/config`, {
    method: "PUT", credentials: "same-origin",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ yaml: serializeDesign() }),
  });
  if (res.ok) { const { version } = await res.json(); setStatus("Saved (v" + version + ")"); }
  else if (res.status === 401) { setStatus("Signed out - reload."); }
  else { setStatus("Save failed (" + res.status + ")"); }
}

async function load() {
  if (!deviceId) return;
  const res = await fetch(`/api/devices/${deviceId}/config`, { credentials: "same-origin" });
  if (!res.ok) return; // 404 = new device, start empty
  try {
    const text = await res.text();
    const doc = window.jsyaml ? jsyaml.load(text) : JSON.parse(text);
    const parsed = fromStoredDoc(doc);
    if (parsed) applyState(parsed);
  } catch (_) { /* unreadable / not ours; start empty */ }
}

function setStatus(s) { $("status").textContent = s; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- panel config format ----------------------------------------------------
// The editor stores and round-trips a NATIVE pyEfis config fragment: a `main`
// block (device screen size + default screen) and one screenbuilder `screen` per
// editor screen. The device runs this as-is -- no "compile" step. Element groups
// are expanded to concrete instruments here (pyEfis has no group concept), and
// editor-only options (preview_scene) are stripped. See docs/panel_config_format.md.
function round1(n) { return Math.round(n * 10) / 10; }

// Expand element-group placeholders into their child instruments at absolute
// grid coordinates (same math as Ungroup); pass concrete instruments through.
function expandGroups(instruments) {
  const out = [];
  for (const inst of instruments) {
    if (inst.type !== "group") { out.push(inst); continue; }
    const def = state.groupsById[inst.id];
    if (!def) continue;
    for (const ch of def.instruments) {
      out.push({
        type: ch.type,
        row: inst.row + (ch.row / def.grid.rows) * inst.span.rows,
        column: inst.column + (ch.column / def.grid.columns) * inst.span.columns,
        span: {
          rows: (ch.span.rows / def.grid.rows) * inst.span.rows,
          columns: (ch.span.columns / def.grid.columns) * inst.span.columns,
        },
        options: { ...(ch.options || {}) },
      });
    }
  }
  return out;
}

// One editor instrument -> one pyEfis screenbuilder instrument.
function toScreenInstrument(inst) {
  const out = {
    type: inst.type,
    row: round1(inst.row),
    column: round1(inst.column),
    span: { rows: round1(inst.span.rows), columns: round1(inst.span.columns) },
  };
  const opts = { ...(inst.options || {}) };
  delete opts.preview_scene;          // editor-only: which SVS preview image to show
  if (Object.keys(opts).length) out.options = opts;
  return out;
}

// Build the native pyEfis fragment (main + every screen) from editor state.
function toPyefisDoc() {
  const main = {
    screenWidth: state.screen.width,
    screenHeight: state.screen.height,
    defaultScreen: state.defaultScreen,
  };
  if (state.screen.inches != null) main.screenDiagonalInches = state.screen.inches; // editor metadata; pyEfis ignores unknown main keys
  const screens = {};
  for (const sc of state.screens) {
    screens[sc.name] = {
      module: "pyefis.screens.screenbuilder",
      title: sc.name,
      layout: { rows: sc.layout.rows, columns: sc.layout.columns },
      instruments: expandGroups(sc.instruments).map(toScreenInstrument),
    };
  }
  return { main, screens };
}
function serializeDesign() {
  return window.jsyaml ? jsyaml.dump(toPyefisDoc(), { lineWidth: 100, noRefs: true })
                       : JSON.stringify(toPyefisDoc(), null, 2);
}
function codeMsg(s, err) { const m = $("code-msg"); m.textContent = s; m.style.color = err ? "#ff7b9c" : "#8b949e"; }

// Parse a stored config back into {layout, screen, instruments}. Accepts the
// native form (main + screens) and the legacy "design" form (kind: pyefis-screen)
// so older saves still open; the next save rewrites them native.
function fromStoredDoc(doc) {
  if (!doc || typeof doc !== "object") return null;
  if (doc.screens && typeof doc.screens === "object") {
    const names = Object.keys(doc.screens);
    if (!names.length) return null;
    const screens = names.map((name) => {
      const sc = doc.screens[name] || {};
      return {
        name,
        layout: sc.layout || { rows: 110, columns: 200 },
        instruments: Array.isArray(sc.instruments) ? sc.instruments : [],
      };
    });
    const m = doc.main || {};
    const def = (typeof m.defaultScreen === "string" && names.includes(m.defaultScreen)) ? m.defaultScreen : names[0];
    return {
      screens, defaultScreen: def,
      screen: { width: m.screenWidth || 1280, height: m.screenHeight || 800, inches: m.screenDiagonalInches ?? null },
    };
  }
  if (Array.isArray(doc.instruments)) {              // legacy design form -> one screen
    const s = doc.screen || {};
    return {
      screens: [{ name: "PANEL", layout: doc.layout || { rows: 110, columns: 200 }, instruments: doc.instruments }],
      defaultScreen: "PANEL",
      screen: { width: s.width || 1280, height: s.height || 800, inches: s.inches ?? null },
    };
  }
  return null;
}
function applyState(parsed) {
  state.screens = parsed.screens;
  state.defaultScreen = parsed.defaultScreen;
  state.screen = parsed.screen;
  setActive(0);
}
function applyCode() {
  let doc;
  try { doc = window.jsyaml ? jsyaml.load($("code-text").value) : JSON.parse($("code-text").value); }
  catch (e) { codeMsg("Parse error: " + e.message, true); return false; }
  const parsed = fromStoredDoc(doc);
  if (!parsed) { codeMsg("Expected a pyEfis config with a 'screens:' block.", true); return false; }
  applyState(parsed);
  codeMsg(""); return true;
}

// --- screens (multi-screen) -------------------------------------------------
function uniqueScreenName(base, exclude) {
  let n = String(base || "SCREEN").toUpperCase().replace(/[^A-Z0-9_]/g, "_").replace(/^_+|_+$/g, "") || "SCREEN";
  let name = n, k = 2;
  while (state.screens.some((s, i) => i !== exclude && s.name === name)) name = n + (k++);
  return name;
}
function rerenderAll() {
  sizeCanvas(); renderScreensBar(); renderCanvas(); renderProps();
  buildScreenControls(); updateReadout(); renderGuides(); syncCode();
}
function switchScreen(i) {
  if (i === state.active) return;
  setActive(i); rerenderAll();
}
function addScreen() {
  const raw = prompt("New screen name:", "SCREEN" + (state.screens.length + 1));
  if (raw == null) return;
  state.screens.push({ name: uniqueScreenName(raw), layout: { rows: 110, columns: 200 }, instruments: [] });
  setActive(state.screens.length - 1); rerenderAll();
}
function renameScreen(i) {
  const cur = state.screens[i];
  const raw = prompt("Rename screen:", cur.name);
  if (raw == null) return;
  const name = uniqueScreenName(raw, i);
  if (state.defaultScreen === cur.name) state.defaultScreen = name;
  cur.name = name; renderScreensBar(); syncCode();
}
function setDefaultScreen(i) {
  state.defaultScreen = state.screens[i].name; renderScreensBar(); syncCode();
}
function deleteScreen(i) {
  if (state.screens.length <= 1) return;
  if (!confirm("Delete screen '" + state.screens[i].name + "'?")) return;
  const wasDefault = state.screens[i].name === state.defaultScreen;
  state.screens.splice(i, 1);
  if (wasDefault) state.defaultScreen = state.screens[0].name;
  setActive(Math.min(i, state.screens.length - 1)); rerenderAll();
}
function renderScreensBar() {
  const bar = $("screens-bar");
  bar.innerHTML = "";
  state.screens.forEach((sc, i) => {
    const tab = document.createElement("button");
    tab.className = "screen-tab" + (i === state.active ? " active" : "");
    tab.textContent = (sc.name === state.defaultScreen ? "★ " : "") + sc.name;
    tab.title = sc.name === state.defaultScreen ? "boot screen" : "click to edit";
    tab.addEventListener("click", () => switchScreen(i));
    bar.appendChild(tab);
  });
  const add = document.createElement("button");
  add.className = "screen-add"; add.textContent = "+ Screen";
  add.addEventListener("click", addScreen);
  bar.appendChild(add);
  const actions = document.createElement("span");
  actions.className = "screen-actions";
  const mk = (label, fn) => { const b = document.createElement("button"); b.className = "screen-act"; b.textContent = label; b.addEventListener("click", fn); return b; };
  actions.appendChild(mk("Rename", () => renameScreen(state.active)));
  if (state.screens[state.active].name !== state.defaultScreen) actions.appendChild(mk("Set default", () => setDefaultScreen(state.active)));
  if (state.screens.length > 1) actions.appendChild(mk("Delete", () => deleteScreen(state.active)));
  bar.appendChild(actions);
}
// canvas -> code: refresh the textarea (unless the user is typing in it, so we
// never clobber an in-progress edit). Setting .value doesn't fire 'input', so
// there's no loop back to the canvas.
let _codeTimer = null;
function syncCode() {
  if (document.activeElement === $("code-text")) return;
  $("code-text").value = serializeDesign(); codeMsg("");
}
// code -> canvas: parse on edit (debounced); apply only when valid, so a
// half-typed document doesn't blow away the canvas.
$("code-text").addEventListener("input", () => {
  clearTimeout(_codeTimer);
  _codeTimer = setTimeout(() => {
    if (applyCode()) { renderScreensBar(); renderCanvas(); renderProps(); buildScreenControls(); updateReadout(); renderGuides(); }
  }, 350);
});
$("codeToggle").addEventListener("change", (e) => {
  $("code-pane").classList.toggle("hidden", !e.target.checked);
  sizeCanvas(); renderCanvas();
});

// --- boot -------------------------------------------------------------------
async function boot() {
  const me = await fetch("/api/me", { credentials: "same-origin" });
  if (!me.ok) { location.href = "/"; return; }
  $("ctx").textContent = deviceId ? "device #" + deviceId : "(scratch - no device)";
  state.schema = await (await fetch(ASSETS + "/schema.json")).json();
  try {
    const fk = await (await fetch(ASSETS + "/fix_keys.json")).json();
    state.fixKeys = fk.keys || [];
    buildFixKeyDatalist();
  } catch (_) { /* no FIX-key catalog -- fixkey fields stay free-text */ }
  try {
    const gj = await (await fetch(ASSETS + "/groups.json")).json();
    state.groups = gj.groups || [];
    state.groups.forEach((g) => { state.groupsById[g.id] = g; });
  } catch (_) { /* no groups catalog */ }
  await load();
  buildScreenControls();
  $("gridToggle").addEventListener("change", (e) => $("canvas").classList.toggle("grid", e.target.checked));
  $("snapToggle").addEventListener("change", (e) => { state.snap = e.target.checked; });
  $("canvas").classList.toggle("grid", $("gridToggle").checked);
  sizeCanvas();
  renderPalette(); renderScreensBar(); renderCanvas(); renderProps(); updateReadout(); renderGuides();
}
window.addEventListener("resize", () => {
  if (!$("stage").classList.contains("hidden")) { sizeCanvas(); renderCanvas(); }
});
boot();
</script>
