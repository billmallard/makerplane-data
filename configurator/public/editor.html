<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AeroCommons - Panel Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=Inter:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid #21262d; flex-wrap: wrap;
  }
  header .brand { font-weight: 600; color: #e6edf3; }
  header .spacer { flex: 1; }
  header .muted { color: #8b949e; font-size: 13px; }
  button, .btn {
    font: inherit; border: 1px solid #30363d; background: #21262d; color: #e6edf3;
    border-radius: 7px; padding: 7px 12px; cursor: pointer; text-decoration: none;
  }
  button:hover { border-color: #8b949e; }
  .btn.primary { background: #238636; border-color: #2ea043; }
  .layout { flex: 1; display: flex; min-height: 0; }
  .palette, .props {
    width: 240px; overflow-y: auto; padding: 12px; border-right: 1px solid #21262d;
  }
  .props { border-right: none; border-left: 1px solid #21262d; width: 280px; }
  .stage { flex: 1; min-height: 0; overflow: auto; padding: 18px; display: flex; justify-content: center; }
  .center { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .tabs { display: flex; gap: 4px; padding: 8px 12px 0; }
  .tab { font: inherit; background: none; border: 1px solid transparent; border-bottom: none; padding: 6px 14px; color: #8b949e; border-radius: 6px 6px 0 0; cursor: pointer; }
  .tab.active { color: #e6edf3; background: #161b22; border-color: #21262d; }
  #code-pane { flex: 0 0 32%; min-height: 120px; display: flex; flex-direction: column; padding: 10px 12px; border-top: 1px solid #21262d; }
  #code-pane.hidden { display: none; }
  .hidden { display: none; }
  .code-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  #code-text { flex: 1; width: 100%; resize: none; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 7px; padding: 10px; line-height: 1.4; }
  h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #8b949e; margin: 14px 0 6px; }
  h3:first-child { margin-top: 0; }
  .pal-item {
    display: flex; align-items: center; gap: 8px; padding: 6px; border: 1px solid #21262d;
    border-radius: 6px; margin-bottom: 6px; cursor: grab; background: #161b22;
  }
  .pal-item:hover { border-color: #8b949e; }
  .pal-item img { width: 44px; height: 30px; object-fit: contain; background: #000; border-radius: 3px; }
  .pal-item .lbl { font-size: 12px; color: #e6edf3; }
  .pal-group { position: relative; width: 44px; height: 30px; background: #000; border-radius: 3px; flex: 0 0 auto; }
  .pal-group img { position: absolute; object-fit: fill; }
  .inst.group { outline-color: rgba(150,180,205,.6); }
  .gchild { position: absolute; object-fit: fill; pointer-events: none; }
  #canvas { position: relative; background: #000; border: 1px solid #30363d; }
  #canvas.dragover { outline: 2px dashed #2ea043; outline-offset: -2px; }
  #canvas.grid {
    background-image:
      repeating-linear-gradient(to right, rgba(255,255,255,.045) 0 1px, transparent 1px var(--cw)),
      repeating-linear-gradient(to bottom, rgba(255,255,255,.045) 0 1px, transparent 1px var(--ch)),
      repeating-linear-gradient(to right, rgba(255,255,255,.10) 0 1px, transparent 1px var(--cw10)),
      repeating-linear-gradient(to bottom, rgba(255,255,255,.10) 0 1px, transparent 1px var(--ch10));
  }
  #guides, #align { position: absolute; inset: 0; pointer-events: none; }
  .guide-v { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(96,165,196,.35); }
  .guide-h { position: absolute; left: 0; right: 0; height: 1px; background: rgba(96,165,196,.35); }
  .guide-box { position: absolute; border: 1px dashed rgba(96,165,196,.45); border-radius: 2px; }
  .guide-label { position: absolute; top: 2px; left: 5px; font-size: 10px; color: rgba(150,180,205,.8); }
  .align-v { position: absolute; top: 0; bottom: 0; width: 1px; background: #e24bd0; }
  .align-h { position: absolute; left: 0; right: 0; height: 1px; background: #e24bd0; }
  .inst { position: absolute; outline: 1px solid rgba(120,140,160,.4); }
  .inst img { width: 100%; height: 100%; display: block; pointer-events: none; object-fit: fill; }
  .inst.lock img { object-fit: contain; }
  .inst-text {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    overflow: hidden; line-height: 1; white-space: nowrap; pointer-events: none; color: #fff;
  }
  .gauge { width: 100%; height: 100%; box-sizing: border-box; pointer-events: none; overflow: hidden; }
  .gauge-svg { width: 100%; height: 100%; display: block; }
  .bargauge { display: flex; flex-direction: column; align-items: center; padding: 2px; gap: 1px; }
  .bargauge .g-name, .bargauge .g-val { line-height: 1; white-space: nowrap; }
  .bargauge .g-track { position: relative; border: 1px solid #30363d; border-radius: 2px; }
  .bargauge.vert .g-track { flex: 1; width: 48%; background: linear-gradient(to top, rgba(46,160,67,.22) 0 75%, rgba(210,153,34,.30) 75% 90%, rgba(218,54,51,.35) 90% 100%); }
  .bargauge.vert .g-fill { position: absolute; left: 0; right: 0; bottom: 0; background: #2ea043; }
  .bargauge.horiz .g-track { width: 92%; height: 42%; background: linear-gradient(to right, rgba(46,160,67,.22) 0 75%, rgba(210,153,34,.30) 75% 90%, rgba(218,54,51,.35) 90% 100%); }
  .bargauge.horiz .g-fill { position: absolute; left: 0; top: 0; bottom: 0; background: #2ea043; }
  .tape { position: relative; box-sizing: border-box; background: rgba(18,22,28,.72); color: #e6edf3; }
  .tape .tk { position: absolute; right: 3px; transform: translateY(-50%); white-space: nowrap; line-height: 1; opacity: .85; }
  .tape .readout { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); background: #000; border: 1px solid #9aa4af; text-align: center; font-weight: 600; line-height: 1.2; }
  .inst.sel { outline: 2px solid #2ea043; z-index: 50; }
  .inst .handle {
    position: absolute; right: -5px; bottom: -5px; width: 12px; height: 12px;
    background: #2ea043; border: 1px solid #0d1117; border-radius: 2px; cursor: se-resize;
  }
  .inst.placeholder { outline-color: rgba(210,170,90,.6); }
  .field { margin-bottom: 9px; }
  .field label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 2px; }
  .field input, .field select {
    width: 100%; font: inherit; font-size: 13px; background: #0d1117; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 5px; padding: 5px 7px;
  }
  .field input[type=checkbox] { width: auto; }
  .field input[type=color] { height: 30px; padding: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .muted { color: #8b949e; font-size: 13px; }
  .empty { color: #6e7681; font-size: 13px; padding: 20px 4px; }
  #status { font-size: 12px; color: #8b949e; }
  .layer-tools { gap: 4px; margin-bottom: 8px; }
  .layer-tools button { padding: 3px 7px; font-size: 12px; }
  ul.layers { list-style: none; padding: 0; margin: 0 0 6px; }
  ul.layers .layer {
    padding: 5px 8px; border: 1px solid #21262d; border-radius: 5px; margin-bottom: 4px;
    font-size: 12px; cursor: pointer; color: #8b949e;
  }
  ul.layers .layer:hover { border-color: #8b949e; }
  ul.layers .layer.sel { border-color: #2ea043; color: #e6edf3; }
  hr.sep { border: none; border-top: 1px solid #21262d; margin: 14px 0; }
  .tsel { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 5px; }
  .tsel select, .num {
    font: inherit; font-size: 12px; background: #0d1117; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 5px; padding: 4px 6px;
  }
  .num { width: 62px; }
</style>
</head>
<body>
<header>
  <span class="brand">AeroCommons</span><span class="muted">Panel Editor</span>
  <span class="muted" id="ctx"></span>
  <label class="tsel">Screen <select id="res"></select></label>
  <span id="custom" class="hidden"><input id="cw" type="number" class="num"> × <input id="ch" type="number" class="num"></span>
  <label class="tsel">Size <select id="inches"></select></label>
  <span class="muted" id="readout"></span>
  <label class="tsel"><input type="checkbox" id="gridToggle" checked> Grid</label>
  <label class="tsel"><input type="checkbox" id="snapToggle"> Snap</label>
  <label class="tsel">Guides
    <select id="guides-sel">
      <option value="none">none</option>
      <option value="center">center</option>
      <option value="thirds">thirds</option>
      <option value="golden">golden φ</option>
      <option value="basic-t">basic-T</option>
      <option value="pfd-ems">PFD + EMS (⅔)</option>
    </select>
  </label>
  <label class="tsel"><input type="checkbox" id="codeToggle" checked> Code</label>
  <span class="spacer"></span>
  <span id="status"></span>
  <button id="del">Delete</button>
  <button id="save" class="btn primary">Save</button>
  <a class="btn" href="/">Done</a>
</header>

<div class="layout">
  <aside class="palette" id="palette"></aside>
  <div class="center">
    <div class="stage" id="stage"><div id="canvas"><div id="guides"></div><div id="align"></div></div></div>
    <div id="code-pane">
      <div class="code-bar"><span class="muted">YAML — edits apply live</span><span id="code-msg" class="muted"></span></div>
      <textarea id="code-text" spellcheck="false"></textarea>
    </div>
  </div>
  <aside class="props" id="props"><p class="empty">Select an instrument to edit its properties, or drag one from the left onto the canvas.</p></aside>
</div>

<script>
const $ = (id) => document.getElementById(id);
const ASSETS = "/assets/editor";
const params = new URLSearchParams(location.search);
const deviceId = params.get("device");

const state = {
  schema: null,
  layout: { rows: 110, columns: 200 },          // pyEfis normalised grid (portable)
  screen: { width: 1280, height: 800, inches: 10.1 },  // target device
  instruments: [],     // {type, row, column, span:{rows,columns}, options:{}}
  selected: -1,
  canvasW: 0, canvasH: 0,
  snap: false,
  guides: "none",
  groups: [], groupsById: {},
};

const SNAP = 10;  // grid cells; "Snap" rounds to this (aligned with the grid majors)
function snapTo(v) { return state.snap ? Math.round(v / SNAP) * SNAP : Math.round(v); }

// Text-bearing instruments are drawn live in the browser (HTML text in the
// chosen web font + colour), so font/colour/text changes preview accurately.
// Everything else uses the pre-rendered SVG.
const LIVE_TEXT = new Set(["static_text", "value_text", "numeric_display", "heading_display"]);
function sampleText(inst) {
  const o = inst.options || {};
  switch (inst.type) {
    case "static_text": return o.text || "Text";
    case "heading_display": return "360";
    case "numeric_display": return "123";
    case "value_text": return o.dbkey || "ABC";
    default: return inst.type;
  }
}

// Live parametric gauges (arc + bar): drawn in the browser from the
// instrument's options, with a sample value + warn/alarm zones. The real value
// and bands are aircraft / FIX data (see #64), so the fill is representative.
const LIVE_GAUGE = new Set(["arc_gauge", "vertical_bar_gauge", "horizontal_bar_gauge"]);
const SVG_NS = "http://www.w3.org/2000/svg";
const GAUGE_FILL = 0.62;  // sample fill fraction (in the green zone)

function sampleGaugeValue(o) {
  const dec = o.decimal_places ?? 0;
  const num = dec > 0 ? (26.8).toFixed(dec) : "268";
  return num + (o.show_units ? "°" : "");
}

function buildBarGauge(inst, vertical) {
  const o = inst.options || {};
  const r = rect(inst);
  const wrap = document.createElement("div");
  wrap.className = "gauge bargauge " + (vertical ? "vert" : "horiz");
  wrap.style.color = o.fg_color || "#e6edf3";
  wrap.style.fontFamily = '"' + (o.font_family || "DejaVu Sans Condensed") + '"';
  wrap.style.fontSize = Math.max(7, Math.min(15, (vertical ? r.w : r.h) * 0.24)) + "px";
  const name = document.createElement("div"); name.className = "g-name"; name.textContent = o.name || ""; wrap.appendChild(name);
  const track = document.createElement("div"); track.className = "g-track";
  const fillEl = document.createElement("div"); fillEl.className = "g-fill";
  if (vertical) fillEl.style.height = (GAUGE_FILL * 100) + "%"; else fillEl.style.width = (GAUGE_FILL * 100) + "%";
  track.appendChild(fillEl); wrap.appendChild(track);
  const val = document.createElement("div"); val.className = "g-val"; val.textContent = sampleGaugeValue(o); wrap.appendChild(val);
  return wrap;
}

function _polar(cx, cy, r, deg) { const a = (deg - 90) * Math.PI / 180; return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
function _arc(cx, cy, r, a0, a1) {
  const p0 = _polar(cx, cy, r, a1), p1 = _polar(cx, cy, r, a0);
  const large = (a1 - a0) <= 180 ? "0" : "1";
  return `M ${p0.x} ${p0.y} A ${r} ${r} 0 ${large} 0 ${p1.x} ${p1.y}`;
}
function buildArcGauge(inst) {
  const o = inst.options || {};
  const fg = o.fg_color || "#e6edf3";
  const font = o.font_family || "DejaVu Sans Condensed";
  const svg = document.createElementNS(SVG_NS, "svg");
  svg.setAttribute("viewBox", "0 0 100 100");
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  svg.classList.add("gauge-svg");
  const cx = 50, cy = 52, r = 38, A0 = -135, SPAN = 270;
  const seg = (fa, fb, color) => {
    const p = document.createElementNS(SVG_NS, "path");
    p.setAttribute("d", _arc(cx, cy, r, A0 + fa * SPAN, A0 + fb * SPAN));
    p.setAttribute("stroke", color); p.setAttribute("stroke-width", "9"); p.setAttribute("fill", "none");
    svg.appendChild(p);
  };
  seg(0, 0.75, "rgba(46,160,67,.35)");
  seg(0.75, 0.9, "rgba(210,153,34,.5)");
  seg(0.9, 1, "rgba(218,54,51,.55)");
  seg(0, GAUGE_FILL, "#2ea043");
  const txt = (y, size, weight, s) => {
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", "50"); t.setAttribute("y", String(y)); t.setAttribute("text-anchor", "middle");
    t.setAttribute("dominant-baseline", "middle"); t.setAttribute("fill", fg);
    t.setAttribute("font-size", String(size)); t.setAttribute("font-family", font);
    if (weight) t.setAttribute("font-weight", String(weight));
    t.textContent = s; svg.appendChild(t);
  };
  if (o.name) txt(42, 11, null, o.name);
  txt(60, 17, 600, sampleGaugeValue(o));
  return svg;
}

// Attitude indicator: sky/ground + roll + pitch ladder + aircraft symbol, drawn
// from a sample pitch/roll. Reflects symbol_color live.
let _svgUid = 0;
function svgFromString(s) { const t = document.createElement("template"); t.innerHTML = s.trim(); return t.content.firstChild; }
function buildAttitude(inst) {
  const o = inst.options || {};
  const sym = o.symbol_color || "#ffd400";
  const pitch = 4, roll = -9, ppd = 1.6, id = _svgUid++;
  const ladder = [10, 20, -10, -20].map((d) => {
    const y = 50 - d * ppd, w = (d % 20 === 0) ? 16 : 10;
    return `<line x1="${50 - w}" y1="${y}" x2="${50 + w}" y2="${y}" stroke="#fff" stroke-width="0.7"/>`
      + `<text x="${50 - w - 2}" y="${y + 1.4}" fill="#fff" font-size="4" text-anchor="end">${Math.abs(d)}</text>`
      + `<text x="${50 + w + 2}" y="${y + 1.4}" fill="#fff" font-size="4">${Math.abs(d)}</text>`;
  }).join("");
  return svgFromString(`
<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" class="gauge-svg">
  <defs>
    <clipPath id="aic${id}"><rect x="0" y="0" width="100" height="100"/></clipPath>
    <linearGradient id="ais${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1f6fd0"/><stop offset="1" stop-color="#57a0e8"/></linearGradient>
    <linearGradient id="aig${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7d5328"/><stop offset="1" stop-color="#553619"/></linearGradient>
  </defs>
  <g clip-path="url(#aic${id})">
    <g transform="rotate(${roll} 50 50)"><g transform="translate(0 ${pitch * ppd})">
      <rect x="-90" y="-170" width="280" height="220" fill="url(#ais${id})"/>
      <rect x="-90" y="50" width="280" height="220" fill="url(#aig${id})"/>
      <line x1="-90" y1="50" x2="190" y2="50" stroke="#fff" stroke-width="1.1"/>
      ${ladder}
    </g></g>
    <path d="M50 6 L46.5 12 L53.5 12 Z" fill="#fff"/>
    <g stroke="${sym}" stroke-width="2.4" fill="none" stroke-linecap="round">
      <line x1="20" y1="50" x2="40" y2="50"/><line x1="60" y1="50" x2="80" y2="50"/>
      <path d="M44 50 L50 56 L56 50"/>
    </g>
    <circle cx="50" cy="50" r="1.5" fill="${sym}"/>
  </g>
</svg>`);
}

// Vertical tape (airspeed / altimeter): scrolling numbers around a sample value
// with a centred readout box. HTML (not SVG) so the digits never distort.
function buildTape(inst) {
  const o = inst.options || {};
  const isAlt = inst.type === "altimeter_tape";
  const value = isAlt ? 3500 : 110, step = isAlt ? 200 : 20, span = 6 * step;
  const r = rect(inst);
  const wrap = document.createElement("div");
  wrap.className = "gauge tape";
  wrap.style.fontFamily = '"' + (o.font_family || "DejaVu Sans Condensed") + '"';
  wrap.style.fontSize = Math.max(7, Math.min(15, r.w * 0.26)) + "px";
  if (o.fg_color) wrap.style.color = o.fg_color;
  const base = Math.round(value / step) * step;
  for (let k = -4; k <= 4; k++) {
    const n = base + k * step, top = 50 - (n - value) / span * 100;
    if (top < 3 || top > 97) continue;
    const tk = document.createElement("div"); tk.className = "tk";
    tk.style.top = top + "%"; tk.textContent = n; wrap.appendChild(tk);
  }
  const ro = document.createElement("div"); ro.className = "readout"; ro.textContent = value;
  wrap.appendChild(ro);
  return wrap;
}

// Standard "basic-T" arrangement (grid units): attitude centre, airspeed left,
// altimeter right, HSI below, heading top. A starting template + a guide.
const BASIC_T = [
  { type: "atitude_indicator", row: 6, column: 68, span: { rows: 64, columns: 64 } },
  { type: "airspeed_tape", row: 10, column: 6, span: { rows: 56, columns: 16 } },
  { type: "altimeter_tape", row: 10, column: 178, span: { rows: 56, columns: 16 } },
  { type: "horizontal_situation_indicator", row: 72, column: 74, span: { rows: 34, columns: 52 } },
  { type: "heading_display", row: 0, column: 92, span: { rows: 6, columns: 16 } },
];

// --- composition guides (static overlay) ------------------------------------
function guideBox(parent, lf, tf, wf, hf, label) {
  const b = document.createElement("div"); b.className = "guide-box";
  b.style.left = (lf * 100) + "%"; b.style.top = (tf * 100) + "%";
  b.style.width = (wf * 100) + "%"; b.style.height = (hf * 100) + "%";
  if (label) { const s = document.createElement("span"); s.className = "guide-label"; s.textContent = label; b.appendChild(s); }
  parent.appendChild(b);
}

function renderGuides() {
  const g = $("guides"); g.innerHTML = "";
  const m = state.guides, V = [], H = [];
  if (m === "center") { V.push(0.5); H.push(0.5); }
  else if (m === "thirds") { V.push(1 / 3, 2 / 3); H.push(1 / 3, 2 / 3); }
  else if (m === "golden") { V.push(0.382, 0.618); H.push(0.382, 0.618); }
  else if (m === "basic-t") {
    for (const t of BASIC_T) {
      guideBox(g, t.column / state.layout.columns, t.row / state.layout.rows,
               t.span.columns / state.layout.columns, t.span.rows / state.layout.rows);
    }
  } else if (m === "pfd-ems") {
    // Primary flight (attitude/airspeed/altitude) in the top-left two-thirds;
    // engine/aux in the right third and the bottom third.
    guideBox(g, 0, 0, 2 / 3, 2 / 3, "Primary (PFD)");
    guideBox(g, 2 / 3, 0, 1 / 3, 1, "EMS / aux");
    guideBox(g, 0, 2 / 3, 2 / 3, 1 / 3, "EMS / aux");
  }
  for (const f of V) { const d = document.createElement("div"); d.className = "guide-v"; d.style.left = (f * 100) + "%"; g.appendChild(d); }
  for (const f of H) { const d = document.createElement("div"); d.className = "guide-h"; d.style.top = (f * 100) + "%"; g.appendChild(d); }
}

// --- smart alignment (snap-to-object/guide while dragging) -------------------
function alignTargets() {
  const cols = state.layout.columns, rows = state.layout.rows;
  const V = [0, cols / 2, cols], H = [0, rows / 2, rows];   // canvas edges + centre
  const m = state.guides;
  if (m === "thirds") { V.push(cols / 3, 2 * cols / 3); H.push(rows / 3, 2 * rows / 3); }
  else if (m === "golden") { V.push(cols * 0.382, cols * 0.618); H.push(rows * 0.382, rows * 0.618); }
  else if (m === "basic-t") {
    for (const t of BASIC_T) {
      V.push(t.column, t.column + t.span.columns / 2, t.column + t.span.columns);
      H.push(t.row, t.row + t.span.rows / 2, t.row + t.span.rows);
    }
  } else if (m === "pfd-ems") { V.push(cols * 2 / 3); H.push(rows * 2 / 3); }
  state.instruments.forEach((o, idx) => {
    if (idx === state.selected) return;
    V.push(o.column, o.column + o.span.columns / 2, o.column + o.span.columns);
    H.push(o.row, o.row + o.span.rows / 2, o.row + o.span.rows);
  });
  return { V, H };
}

function snapAlign(inst, col, row, gw, gh) {
  const tolC = 6 / gw, tolR = 6 / gh;
  const { V, H } = alignTargets();
  let outCol = col, outRow = row, vg = null, hg = null, bestC = tolC, bestR = tolR;
  const anchorsC = [[col, 0], [col + inst.span.columns / 2, inst.span.columns / 2], [col + inst.span.columns, inst.span.columns]];
  for (const line of V) for (const [a, off] of anchorsC) {
    const d = Math.abs(a - line);
    if (d <= bestC) { bestC = d; outCol = line - off; vg = line; }
  }
  const anchorsR = [[row, 0], [row + inst.span.rows / 2, inst.span.rows / 2], [row + inst.span.rows, inst.span.rows]];
  for (const line of H) for (const [a, off] of anchorsR) {
    const d = Math.abs(a - line);
    if (d <= bestR) { bestR = d; outRow = line - off; hg = line; }
  }
  return { col: outCol, row: outRow, vg, hg };
}

function drawAlign(vg, hg) {
  const a = $("align"); a.innerHTML = "";
  if (vg != null) { const d = document.createElement("div"); d.className = "align-v"; d.style.left = (vg / state.layout.columns * 100) + "%"; a.appendChild(d); }
  if (hg != null) { const d = document.createElement("div"); d.className = "align-h"; d.style.top = (hg / state.layout.rows * 100) + "%"; a.appendChild(d); }
}
function clearAlign() { $("align").innerHTML = ""; }

// Common Pi-panel resolutions + sizes (the canvas adopts the chosen aspect;
// pyEfis maps the 200x110 grid onto the real screen, so aspect is what drives
// the visual layout -- absolute pixels are normalised away).
const RESOLUTIONS = [
  { w: 1024, h: 600 }, { w: 1280, h: 800 }, { w: 1280, h: 1024 },
  { w: 1920, h: 1080 }, { w: 1920, h: 1200 },
];
const INCHES = [5, 7, 8, 10.1, 11.6, 15.6];

function gcd(a, b) { return b ? gcd(b, a % b) : a; }
function aspect(w, h) { const g = gcd(w, h), aw = w / g, ah = h / g; return ah <= 20 ? `${aw}:${ah}` : `${(w / h).toFixed(2)}:1`; }
function dpi() { return state.screen.inches ? Math.round(Math.hypot(state.screen.width, state.screen.height) / state.screen.inches) : null; }

function buildScreenControls() {
  const res = $("res");
  res.innerHTML = "";
  for (const r of RESOLUTIONS) {
    const o = document.createElement("option");
    o.value = r.w + "x" + r.h; o.textContent = r.w + " × " + r.h;
    res.appendChild(o);
  }
  const custom = document.createElement("option"); custom.value = "custom"; custom.textContent = "Custom…"; res.appendChild(custom);
  const inch = $("inches");
  inch.innerHTML = "";
  const none = document.createElement("option"); none.value = ""; none.textContent = "— in"; inch.appendChild(none);
  for (const i of INCHES) { const o = document.createElement("option"); o.value = i; o.textContent = i + "″"; inch.appendChild(o); }
  res.addEventListener("change", onResChange);
  inch.addEventListener("change", () => { state.screen.inches = parseFloat($("inches").value) || null; applyScreen(); });
  $("cw").addEventListener("input", onCustom);
  $("ch").addEventListener("input", onCustom);
  syncScreenControls();
}

function onResChange() {
  const v = $("res").value;
  if (v === "custom") { $("custom").classList.remove("hidden"); $("cw").value = state.screen.width; $("ch").value = state.screen.height; return; }
  $("custom").classList.add("hidden");
  const [w, h] = v.split("x").map(Number);
  state.screen.width = w; state.screen.height = h; applyScreen();
}
function onCustom() {
  const w = parseInt($("cw").value, 10), h = parseInt($("ch").value, 10);
  if (w > 0 && h > 0) { state.screen.width = w; state.screen.height = h; applyScreen(); }
}
function syncScreenControls() {
  const key = state.screen.width + "x" + state.screen.height;
  if ([...$("res").options].some((o) => o.value === key)) { $("res").value = key; $("custom").classList.add("hidden"); }
  else { $("res").value = "custom"; $("custom").classList.remove("hidden"); $("cw").value = state.screen.width; $("ch").value = state.screen.height; }
  $("inches").value = state.screen.inches || "";
}
function applyScreen() { sizeCanvas(); renderCanvas(); renderProps(); updateReadout(); }
function updateReadout() {
  const d = dpi();
  $("readout").textContent =
    `${state.screen.width}×${state.screen.height} · ${aspect(state.screen.width, state.screen.height)}`
    + (d ? ` · ${state.screen.inches}″ · ${d} DPI` : "");
}

// --- grid <-> pixel math (port of screenbuilder_layout, ratio=false) --------
function cell() { return { gw: state.canvasW / state.layout.columns, gh: state.canvasH / state.layout.rows }; }
function rect(inst) {
  const { gw, gh } = cell();
  return {
    x: gw * inst.column, y: gh * inst.row,
    w: gw * (inst.span?.columns ?? 1), h: gh * (inst.span?.rows ?? 1),
  };
}

// --- palette ----------------------------------------------------------------
function renderPalette() {
  const pal = $("palette");
  pal.innerHTML = "";

  if (state.groups.length) {
    const h = document.createElement("h3"); h.textContent = "groups"; pal.appendChild(h);
    for (const g of state.groups) {
      const item = document.createElement("div"); item.className = "pal-item"; item.draggable = true;
      item.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", "group:" + g.id));
      const box = document.createElement("div"); box.className = "pal-group";
      for (const ch of g.instruments) {
        const ci = document.createElement("img"); ci.src = `${ASSETS}/palette/${ch.type}.svg`;
        ci.style.left = (ch.column / g.grid.columns * 100) + "%"; ci.style.top = (ch.row / g.grid.rows * 100) + "%";
        ci.style.width = (ch.span.columns / g.grid.columns * 100) + "%"; ci.style.height = (ch.span.rows / g.grid.rows * 100) + "%";
        box.appendChild(ci);
      }
      const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = g.label;
      item.append(box, lbl); pal.appendChild(item);
    }
  }

  const byCat = {};
  for (const [type, meta] of Object.entries(state.schema.instruments)) {
    (byCat[meta.category] ||= []).push([type, meta]);
  }
  for (const cat of Object.keys(byCat).sort()) {
    const h = document.createElement("h3"); h.textContent = cat; pal.appendChild(h);
    for (const [type, meta] of byCat[cat].sort((a, b) => a[1].label.localeCompare(b[1].label))) {
      const item = document.createElement("div");
      item.className = "pal-item";
      item.draggable = true;
      item.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", type));
      const img = document.createElement("img");
      img.src = `${ASSETS}/palette/${type}.svg`; img.alt = type;
      const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = meta.label;
      item.append(img, lbl);
      pal.appendChild(item);
    }
  }
}

// --- canvas -----------------------------------------------------------------
function sizeCanvas() {
  // Canvas adopts the TARGET screen's aspect ratio (the 200x110 grid maps onto
  // it), scaled to fit the available editor area.
  const c = $("canvas");
  const stage = c.parentElement;
  const availW = stage.clientWidth - 36;
  const availH = stage.clientHeight - 36;
  const ar = state.screen.width / state.screen.height;
  let w = Math.min(availW, 1400), h = w / ar;
  if (h > availH) { h = availH; w = h * ar; }
  state.canvasW = Math.round(w);
  state.canvasH = Math.round(h);
  c.style.width = state.canvasW + "px";
  c.style.height = state.canvasH + "px";
  const cw = state.canvasW / state.layout.columns, ch = state.canvasH / state.layout.rows;
  c.style.setProperty("--cw", cw + "px");
  c.style.setProperty("--ch", ch + "px");
  c.style.setProperty("--cw10", cw * 10 + "px");
  c.style.setProperty("--ch10", ch * 10 + "px");
}

function renderCanvas() {
  const c = $("canvas");
  c.querySelectorAll(".inst").forEach((e) => e.remove());
  state.instruments.forEach((inst, i) => {
    const meta = state.schema.instruments[inst.type] || {};
    const el = document.createElement("div");
    el.className = "inst" + (meta.offscreen_renderable ? "" : " placeholder") + (meta.keep_aspect ? " lock" : "");
    if (i === state.selected) el.classList.add("sel");
    el.dataset.i = i;
    positionEl(el, inst);
    if (inst.type === "group") {
      el.classList.add("group");
      const def = state.groupsById[inst.id];
      if (def) for (const ch of def.instruments) {
        const ci = document.createElement("img"); ci.className = "gchild";
        ci.src = `${ASSETS}/palette/${ch.type}.svg`;
        ci.style.left = (ch.column / def.grid.columns * 100) + "%"; ci.style.top = (ch.row / def.grid.rows * 100) + "%";
        ci.style.width = (ch.span.columns / def.grid.columns * 100) + "%"; ci.style.height = (ch.span.rows / def.grid.rows * 100) + "%";
        el.appendChild(ci);
      }
    } else if (inst.type === "atitude_indicator") {
      el.appendChild(buildAttitude(inst));
    } else if (inst.type === "airspeed_tape" || inst.type === "altimeter_tape") {
      el.appendChild(buildTape(inst));
    } else if (LIVE_GAUGE.has(inst.type)) {
      el.appendChild(inst.type === "arc_gauge"
        ? buildArcGauge(inst)
        : buildBarGauge(inst, inst.type === "vertical_bar_gauge"));
    } else if (LIVE_TEXT.has(inst.type)) {
      const o = inst.options;
      const content = document.createElement("div");
      content.className = "inst-text";
      content.textContent = sampleText(inst);
      content.style.fontFamily = '"' + (o.font_family || "DejaVu Sans Condensed") + '"';
      if (o.fg_color) content.style.color = o.fg_color;
      if (o.bg_color) content.style.background = o.bg_color;
      content.style.fontSize = Math.max(8, (o.font_percent || 0.5) * rect(inst).h) + "px";
      el.appendChild(content);
    } else {
      const content = document.createElement("img");
      content.src = `${ASSETS}/palette/${inst.type}.svg`; content.alt = inst.type;
      el.appendChild(content);
    }
    const handle = document.createElement("div"); handle.className = "handle";
    el.appendChild(handle);
    el.addEventListener("mousedown", (e) => startMove(e, i, el));
    handle.addEventListener("mousedown", (e) => startResize(e, i, el));
    c.appendChild(el);
  });
  syncCode();
}

function positionEl(el, inst) {
  const r = rect(inst);
  el.style.left = r.x + "px"; el.style.top = r.y + "px";
  el.style.width = r.w + "px"; el.style.height = r.h + "px";
}

// --- drag from palette ------------------------------------------------------
const canvas = $("canvas");
canvas.addEventListener("dragover", (e) => { e.preventDefault(); canvas.classList.add("dragover"); });
canvas.addEventListener("dragleave", () => canvas.classList.remove("dragover"));
canvas.addEventListener("drop", (e) => {
  e.preventDefault(); canvas.classList.remove("dragover");
  const data = e.dataTransfer.getData("text/plain");
  const cr = canvas.getBoundingClientRect();
  const { gw, gh } = cell();
  const col = clamp(snapTo((e.clientX - cr.left) / gw), 0, state.layout.columns - 1);
  const row = clamp(snapTo((e.clientY - cr.top) / gh), 0, state.layout.rows - 1);
  if (data.startsWith("group:")) {
    const def = state.groupsById[data.slice(6)];
    if (!def) return;
    const sp = def.defaultSpan || { rows: 40, columns: 50 };
    state.instruments.push({ type: "group", id: def.id, row, column: col, span: { rows: sp.rows, columns: sp.columns } });
  } else if (state.schema.instruments[data]) {
    state.instruments.push({ type: data, row, column: col, span: { rows: 20, columns: 20 }, options: {} });
  } else { return; }
  state.selected = state.instruments.length - 1;
  renderCanvas(); renderProps();
});

// --- move / resize ----------------------------------------------------------
function startMove(e, i, el) {
  if (e.target.classList.contains("handle")) return;
  e.preventDefault();
  select(i);
  const { gw, gh } = cell();
  const inst = state.instruments[i];
  const sx = e.clientX, sy = e.clientY, srow = inst.row, scol = inst.column;
  const move = (ev) => {
    const col = clamp(snapTo(scol + (ev.clientX - sx) / gw), 0, state.layout.columns - inst.span.columns);
    const row = clamp(snapTo(srow + (ev.clientY - sy) / gh), 0, state.layout.rows - inst.span.rows);
    const a = snapAlign(inst, col, row, gw, gh);   // snap to objects / guides when close
    inst.column = clamp(a.col, 0, state.layout.columns - inst.span.columns);
    inst.row = clamp(a.row, 0, state.layout.rows - inst.span.rows);
    positionEl(el, inst); syncPosFields(inst);
    drawAlign(a.vg, a.hg);
  };
  const up = () => { clearAlign(); syncCode(); document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); };
  document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
}

function startResize(e, i, el) {
  e.preventDefault(); e.stopPropagation();
  select(i);
  const { gw, gh } = cell();
  const inst = state.instruments[i];
  const sx = e.clientX, sy = e.clientY, sc = inst.span.columns, sr = inst.span.rows;
  const move = (ev) => {
    inst.span.columns = clamp(snapTo(sc + (ev.clientX - sx) / gw), 1, state.layout.columns);
    inst.span.rows = clamp(snapTo(sr + (ev.clientY - sy) / gh), 1, state.layout.rows);
    positionEl(el, inst); syncPosFields(inst);
  };
  const up = () => { syncCode(); document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); };
  document.addEventListener("mousemove", move); document.addEventListener("mouseup", up);
}

function select(i) {
  state.selected = i;
  document.querySelectorAll(".inst").forEach((el) => el.classList.toggle("sel", Number(el.dataset.i) === i));
  renderProps();
}

// --- properties panel -------------------------------------------------------
function renderProps() {
  const p = $("props");
  p.innerHTML = "";

  // Layers (z-order). pyEfis has no z-index: paint order IS list order, so
  // these reorder the instruments array, which serialises straight to YAML.
  if (state.instruments.length) {
    const lh = document.createElement("h3"); lh.textContent = "Layers (top = front)"; p.appendChild(lh);
    const tools = document.createElement("div"); tools.className = "row layer-tools";
    for (const [lbl, where, tip] of [["⤒", "front", "Bring to front"], ["↑", "up", "Forward"], ["↓", "down", "Backward"], ["⤓", "back", "Send to back"]]) {
      const b = document.createElement("button");
      b.textContent = lbl; b.title = tip; b.disabled = state.selected < 0;
      b.addEventListener("click", () => moveSelected(where));
      tools.appendChild(b);
    }
    p.appendChild(tools);
    const list = document.createElement("ul"); list.className = "layers";
    for (let i = state.instruments.length - 1; i >= 0; i--) {   // top = last = front
      const inst = state.instruments[i];
      const li = document.createElement("li");
      li.className = "layer" + (i === state.selected ? " sel" : "");
      li.textContent = state.schema.instruments[inst.type]?.label
        || (inst.type === "group" ? (state.groupsById[inst.id]?.label || "Group") : inst.type);
      li.addEventListener("click", () => select(i));
      list.appendChild(li);
    }
    p.appendChild(list);
  }

  // Per-selection properties
  if (state.selected < 0 || !state.instruments[state.selected]) {
    const hint = document.createElement("p"); hint.className = "empty";
    hint.textContent = state.instruments.length
      ? "Select an instrument to edit its properties."
      : "Drag an instrument from the left onto the canvas.";
    p.appendChild(hint);
    return;
  }
  const inst = state.instruments[state.selected];
  p.appendChild(Object.assign(document.createElement("hr"), { className: "sep" }));

  if (inst.type === "group") {
    const def = state.groupsById[inst.id];
    const gt = document.createElement("h3"); gt.textContent = (def ? def.label : "Group") + " — group"; p.appendChild(gt);
    p.appendChild(numGrid([
      ["row", inst.row, (v) => inst.row = v],
      ["column", inst.column, (v) => inst.column = v],
      ["span rows", inst.span.rows, (v) => inst.span.rows = v],
      ["span cols", inst.span.columns, (v) => inst.span.columns = v],
    ]));
    const ung = document.createElement("button");
    ung.textContent = "Ungroup"; ung.style.marginTop = "8px";
    ung.addEventListener("click", ungroup);
    p.appendChild(ung);
    return;
  }

  const meta = state.schema.instruments[inst.type];
  const title = document.createElement("h3"); title.textContent = meta.label + " — properties"; p.appendChild(title);

  const d = dpi();
  if (d) {
    const pw = (inst.span.columns / state.layout.columns) * state.screen.width / d * 25.4;
    const ph = (inst.span.rows / state.layout.rows) * state.screen.height / d * 25.4;
    const note = document.createElement("p");
    note.className = "muted"; note.style.margin = "0 0 8px";
    note.textContent = `≈ ${pw.toFixed(0)} × ${ph.toFixed(0)} mm on the ${state.screen.inches}″ screen`;
    p.appendChild(note);
  }

  p.appendChild(numGrid([
    ["row", inst.row, (v) => inst.row = v],
    ["column", inst.column, (v) => inst.column = v],
    ["span rows", inst.span.rows, (v) => inst.span.rows = v],
    ["span cols", inst.span.columns, (v) => inst.span.columns = v],
  ]));

  const opts = { ...state.schema.common_options, ...meta.options };
  if (Object.keys(opts).length) {
    const h = document.createElement("h3"); h.textContent = "Options"; p.appendChild(h);
    for (const [name, spec] of Object.entries(opts)) p.appendChild(optionField(inst, name, spec));
  }
}

// Reorder the selected instrument in the array (= change paint order).
function moveSelected(where) {
  const i = state.selected;
  if (i < 0) return;
  const arr = state.instruments;
  const item = arr.splice(i, 1)[0];
  let j;
  if (where === "front") j = arr.length;          // last = painted on top
  else if (where === "back") j = 0;
  else if (where === "up") j = Math.min(arr.length, i + 1);
  else j = Math.max(0, i - 1);
  arr.splice(j, 0, item);
  state.selected = j;
  renderCanvas(); renderProps();
}

// Ungroup: replace the selected group with its children as independent
// top-level instruments (child local positions -> absolute grid).
function ungroup() {
  const g = state.instruments[state.selected];
  if (!g || g.type !== "group") return;
  const def = state.groupsById[g.id];
  if (!def) return;
  const children = def.instruments.map((ch) => ({
    type: ch.type,
    row: g.row + (ch.row / def.grid.rows) * g.span.rows,
    column: g.column + (ch.column / def.grid.columns) * g.span.columns,
    span: {
      rows: (ch.span.rows / def.grid.rows) * g.span.rows,
      columns: (ch.span.columns / def.grid.columns) * g.span.columns,
    },
    options: { ...(ch.options || {}) },
  }));
  state.instruments.splice(state.selected, 1, ...children);
  state.selected = -1;
  renderCanvas(); renderProps();
}

function numGrid(rows) {
  const wrap = document.createElement("div"); wrap.className = "grid2";
  for (const [label, value, set] of rows) {
    const f = document.createElement("div"); f.className = "field";
    const l = document.createElement("label"); l.textContent = label;
    const inp = document.createElement("input"); inp.type = "number"; inp.value = value;
    inp.addEventListener("input", () => {
      const v = parseFloat(inp.value); if (!isNaN(v)) { set(v); repositionSelected(); syncCode(); }
    });
    f.append(l, inp); wrap.appendChild(f);
  }
  return wrap;
}

function optionField(inst, name, spec) {
  const f = document.createElement("div"); f.className = "field";
  const l = document.createElement("label"); l.textContent = spec.label || name; f.appendChild(l);
  const cur = inst.options[name];
  let inp;
  if (spec.type === "boolean") {
    inp = document.createElement("input"); inp.type = "checkbox";
    inp.checked = cur !== undefined ? !!cur : !!spec.default;
    inp.addEventListener("change", () => setOpt(inst, name, inp.checked));
  } else if (spec.type === "enum") {
    inp = document.createElement("select");
    for (const o of spec.enum) { const op = document.createElement("option"); op.value = o; op.textContent = o; inp.appendChild(op); }
    inp.value = cur ?? spec.default ?? spec.enum[0];
    inp.addEventListener("change", () => setOpt(inst, name, inp.value));
  } else if (spec.type === "color") {
    inp = document.createElement("input"); inp.type = "color";
    inp.value = (cur ?? spec.default ?? "#000000").slice(0, 7);
    inp.addEventListener("input", () => setOpt(inst, name, inp.value));
  } else if (spec.type === "number") {
    inp = document.createElement("input"); inp.type = "number"; if (spec.step) inp.step = spec.step;
    inp.placeholder = spec.default ?? "";
    if (cur !== undefined) inp.value = cur;
    inp.addEventListener("input", () => setOpt(inst, name, inp.value === "" ? undefined : parseFloat(inp.value)));
  } else {
    inp = document.createElement("input"); inp.type = "text";
    inp.placeholder = spec.default ?? "";
    if (cur !== undefined) inp.value = cur;
    inp.addEventListener("input", () => setOpt(inst, name, inp.value === "" ? undefined : inp.value));
  }
  f.appendChild(inp);
  return f;
}

function setOpt(inst, name, value) {
  if (value === undefined) delete inst.options[name];
  else inst.options[name] = value;
  renderCanvas();   // redraw live instruments (text + gauges) and sync the code
}

function syncPosFields(inst) {
  const inputs = $("props").querySelectorAll(".grid2 input");
  if (inputs.length === 4) {
    inputs[0].value = inst.row; inputs[1].value = inst.column;
    inputs[2].value = inst.span.rows; inputs[3].value = inst.span.columns;
  }
}
function repositionSelected() {
  const el = document.querySelector(`.inst[data-i="${state.selected}"]`);
  if (el) positionEl(el, state.instruments[state.selected]);
}

// --- delete / save / load ---------------------------------------------------
$("del").addEventListener("click", () => {
  if (state.selected < 0) return;
  state.instruments.splice(state.selected, 1); state.selected = -1;
  renderCanvas(); renderProps();
});
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if ((e.key === "Delete" || e.key === "Backspace") && state.selected >= 0) $("del").click();
  else if (e.key === "]" && state.selected >= 0) moveSelected("up");      // forward
  else if (e.key === "[" && state.selected >= 0) moveSelected("down");    // backward
});

$("guides-sel").addEventListener("change", (e) => { state.guides = e.target.value; renderGuides(); });

$("save").addEventListener("click", save);
async function save() {
  if (!deviceId) { setStatus("No device - open the editor from a project."); return; }
  const design = { kind: "pyefis-screen", version: 1, screen: state.screen, layout: state.layout, instruments: state.instruments };
  setStatus("Saving...");
  const res = await fetch(`/api/devices/${deviceId}/config`, {
    method: "PUT", credentials: "same-origin",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ yaml: JSON.stringify(design, null, 2) }),
  });
  if (res.ok) { const { version } = await res.json(); setStatus("Saved (v" + version + ")"); }
  else if (res.status === 401) { setStatus("Signed out - reload."); }
  else { setStatus("Save failed (" + res.status + ")"); }
}

async function load() {
  if (!deviceId) return;
  const res = await fetch(`/api/devices/${deviceId}/config`, { credentials: "same-origin" });
  if (!res.ok) return; // 404 = new device, start empty
  try {
    const design = JSON.parse(await res.text());
    if (design.layout) state.layout = design.layout;
    if (design.screen) state.screen = {
      width: design.screen.width || 1280,
      height: design.screen.height || 800,
      inches: design.screen.inches ?? null,
    };
    if (Array.isArray(design.instruments)) state.instruments = design.instruments;
  } catch (_) { /* not our JSON design; ignore */ }
}

function setStatus(s) { $("status").textContent = s; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- code tab (design <-> editable YAML) ------------------------------------
function designObject() {
  return { kind: "pyefis-screen", version: 1, screen: state.screen, layout: state.layout, instruments: state.instruments };
}
function serializeDesign() {
  return window.jsyaml ? jsyaml.dump(designObject(), { lineWidth: 100, noRefs: true }) : JSON.stringify(designObject(), null, 2);
}
function codeMsg(s, err) { const m = $("code-msg"); m.textContent = s; m.style.color = err ? "#ff7b9c" : "#8b949e"; }
function applyCode() {
  let design;
  try { design = window.jsyaml ? jsyaml.load($("code-text").value) : JSON.parse($("code-text").value); }
  catch (e) { codeMsg("Parse error: " + e.message, true); return false; }
  if (!design || typeof design !== "object" || !Array.isArray(design.instruments)) {
    codeMsg("Expected an object with an 'instruments' array.", true); return false;
  }
  if (design.layout) state.layout = design.layout;
  if (design.screen) state.screen = design.screen;
  state.instruments = design.instruments;
  state.selected = -1;
  codeMsg(""); return true;
}
// canvas -> code: refresh the textarea (unless the user is typing in it, so we
// never clobber an in-progress edit). Setting .value doesn't fire 'input', so
// there's no loop back to the canvas.
let _codeTimer = null;
function syncCode() {
  if (document.activeElement === $("code-text")) return;
  $("code-text").value = serializeDesign(); codeMsg("");
}
// code -> canvas: parse on edit (debounced); apply only when valid, so a
// half-typed document doesn't blow away the canvas.
$("code-text").addEventListener("input", () => {
  clearTimeout(_codeTimer);
  _codeTimer = setTimeout(() => {
    if (applyCode()) { renderCanvas(); renderProps(); buildScreenControls(); updateReadout(); renderGuides(); }
  }, 350);
});
$("codeToggle").addEventListener("change", (e) => {
  $("code-pane").classList.toggle("hidden", !e.target.checked);
  sizeCanvas(); renderCanvas();
});

// --- boot -------------------------------------------------------------------
async function boot() {
  const me = await fetch("/api/me", { credentials: "same-origin" });
  if (!me.ok) { location.href = "/"; return; }
  $("ctx").textContent = deviceId ? "device #" + deviceId : "(scratch - no device)";
  state.schema = await (await fetch(ASSETS + "/schema.json")).json();
  try {
    const gj = await (await fetch(ASSETS + "/groups.json")).json();
    state.groups = gj.groups || [];
    state.groups.forEach((g) => { state.groupsById[g.id] = g; });
  } catch (_) { /* no groups catalog */ }
  await load();
  buildScreenControls();
  $("gridToggle").addEventListener("change", (e) => $("canvas").classList.toggle("grid", e.target.checked));
  $("snapToggle").addEventListener("change", (e) => { state.snap = e.target.checked; });
  $("canvas").classList.toggle("grid", $("gridToggle").checked);
  sizeCanvas();
  renderPalette(); renderCanvas(); renderProps(); updateReadout(); renderGuides();
}
window.addEventListener("resize", () => {
  if (!$("stage").classList.contains("hidden")) { sizeCanvas(); renderCanvas(); }
});
boot();
</script>
</body>
</html>
