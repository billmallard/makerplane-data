name: ci

# Tests + a no-secrets dry-run of the pipeline on every push / PR.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - name: Unit tests
        run: python -m pytest
      - name: Pipeline dry-run (no network, no secrets)
        run: python -m packtools.run_cyclical --dry-run --date 2026-06-14
